  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mpact reference panel */\n.stalls-section{background:var(--green-l);padding:8px 12px 10px;flex-shrink:0;}\n.stalls-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}\n.stalls-lbl{font-size:8px;font-weight:600;color:#C8EEE3;text-transform:uppercase;letter-spacing:.07em;}\n.add-btn{height:24px;padding:0 9px;border:1px solid rgba(255,255,255,.2);border-radius:5px;background:rgba(255,255,255,.08);color:#C8EEE3;font-size:9px;font-weight:500;cursor:pointer;font-family:\"DM Sans\",sans-serif;}\n.add-btn:hover{background:rgba(255,255,255,.16);}\n.stalls-row{display:flex;gap:6px;flex-wrap:wrap;}\n\n/* Stall pill */\n.stall-pill{border-radius:8px;overflow:hidden;min-width:70px;flex:1;}\n.stall-pill.empty{background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.2);padding:7px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;cursor:pointer;min-height:72px;transition:background .15s,border-color .15s;}\n.stall-pill.empty:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.35);}\n.stall-pill.empty:hover .sp-close-hint{opacity:1;}\n.sp-empty-ico{font-size:13px;opacity:.5;}\n.sp-empty-lbl{font-size:9px;color:rgba(255,255,255,.5);font-style:italic;}\n.sp-close-hint{font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase;margin-top:3px;opacity:.75;transition:opacity .15s;}\n.sp-remove{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.14);border:none;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;transition:all .15s;}\n.sp-remove:hover{background:rgba(255,255,255,.28);color:#fff;}\n.sp-remove-lbl{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:8px;color:rgba(255,255,255,.4);letter-spacing:.05em;text-transform:uppercase;pointer-events:none;}\n.stall-pill.occ{backgro d:var(--amber-l);color:var(--amber-b);border:1px solid var(--amber-b);}\n.tbdg-d{background:#F5F5F5;color:var(--ink-3);border:1px solid #DADADA;}\n\n/* Queue cards — action lives here */\n.q-card{margin:6px 10px;background:var(--card);border-radius:12px;border:1.5px solid var(--rule);overflow:hidden;}\n.q-card.next-up{border-color:var(--green);border-width:2px;}\n.qc-top{padding:10px 12px 7px;display:flex;align-items:flex-start;gap:8px;}\n.qc-pos{width:24px;height:24px;border-radius:7px;background:#F5F5F5;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--ink-3);flex-shrink:0;}\n.qc-pos.next{background:var(--green);color:#C8EEE3;}\n.qc-name{font-family:\"DM Serif Display\",serif;font-size:16px;color:var(--ink);line-height:1.1;}\n.qc-meta{font-size:9px;color:var(--ink-3);font-family:\"DM Mono\",monospace;margin-top:2px;}\n.qc-flags{display:flex;gap:4px;flex-wrap:wrap;padding:0 12px 8px;}\n.qcf{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:500;}\n.qcf-h{background:#FEE2E2;color:#7F1D1D;border:1px solid #B91C1C;}\n.qcf-m{background:#EDE9FE;color:#5B21B6;border:1px solid #7C3AED;}\n.qcf-v{background:var(--blue-l);color:#0C5D8A;border:1px solid var(--blue);}\n.qcf-c{background:var(--green-xl);color:#1A5C38;border:1px solid var(--green-b);}\n\n/* Card actions */\n.qc-actions{border-top:1px solid var(--rule);display:flex;}\n.qca{flex:1;height:42px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;font-family:\"DM Sans\",sans-serif;gap:5px;transition:background .12s;}\n.qca+.qca{border-left:1px solid var(--rule);}\n.qca-send{color:var(--green);background:var(--green-xl);}\n.qca-send:hover{background:#C8EEE3;}\n.qca-missed{color:var(--amber-b);}\n.qca-missed:hover{background:var(--amber-l);}\n.qca-back{color:var(--green);}\n.qca-back:hover{background:var(--green-xl);}\n.chk{width:9px;height:6px;border-left:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(-45deg) translateY(-1px);}\n\n/* Done cards */\n.done-card{margin:6px 10px;background:var(--card);border-radius:11px;border:1.5px solid var(--rule);padding:10px 12px;opacity:.85;}\n.dc-name{font-family:\"DM Serif Display\",serif;font-size:14px;color:var(--ink);margin-bottom:4px;}\n.dc-times{display:flex;align-items:center;gap:8px;}\n.dc-t{font-size:9px;color:var(--ink-3);font-family:\"DM Mono\",monospace;}\n.dc-dur{font-size:9px;font-weight:500;color:var(--green);margin-left:auto;font-family:\"DM Mono\",monospace;}\n.dc-clothing{display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:500;background:var(--green-xl);color:#1A5C38;border:1px solid var(--green-b);}\n\n/* Sheet */\n.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;border-radius:24px;overflow:hidden;z-index:10;}\n.sheet{background:var(--card);border-radius:14px 14px 0 0;width:100%;padding:14px 14px 22px;}\n.sh-handle{width:34px;height:3px;background:#DADADA;border-radius:2px;margin:0 auto 12px;}\n.sh-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px;}\n.sh-sub{font-size:11px;color:var(--ink-3);margin-bottom:12px;line-height:1.5;}\n\n/* Client preview in sheet */\n.cp-box{background:#F8F8F8;border-radius:9px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}\n.cp-av{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#C8EEE3;flex-shrink:0;}\n.cp-name{font-size:13px;font-weight:500;color:var(--ink);}\n.cp-meta{font-size:10px;color:var(--ink-3);margin-top:2px;font-family:\"DM Mono\",monospace;}\n\n/* Stall options in sheet */\n.no-stalls-box{background:var(--green-xl);border:1px dashed var(--green-b);border-radius:12px;padding:18px 16px;text-align:center;margin:6px 0 2px;}\n.no-stalls-ico{font-size:26px;margin-bottom:6px;}\n.no-stalls-title{font-size:13px;font-weight:600;color:var(--green);margin-bottom:3px;}\n.no-stalls-txt{font-size:11.5px;color:var(--green-l);line-height:1.45;}\n\n/* Setup stepper + reminder */\n.stepper{display:flex;align-items:center;justify-content:center;gap:20px;padding:22px 0 10px;}\n.step-btn{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--rule);background:#fff;font-size:22px;color:var(--ink);cursor:pointer;font-family:\"DM Sans\",sans-serif;font-weight:500;display:flex;align-items:center;justify-content:center;transition:all .12s;}\n.step-btn:hover:not(:disabled){border-color:var(--green-b);color:var(--green-l);}\n.step-btn:disabled{opacity:.3;cursor:not-allowed;}\n.step-val{text-align:center;min-width:92px;}\n.step-n{font-family:\"DM Serif Display\",serif;font-size:54px;line-height:1;color:var(--ink);}\n.step-lbl{font-size:11px;color:var(--ink-2);letter-spacing:.04em;text-transform:uppercase;margin-top:4px;}\n.reminder-box{background:var(--amber-l);border-radius:10px;padding:11px 13px;display:flex;align-items:flex-start;gap:10px;margin:10px 0 14px;}\n.rmd-ico{font-size:15px;flex-shrink:0;line-height:1.3;}\n.rmd-txt{font-size:11.5px;color:var(--amber-b);line-height:1.45;}\n.rmd-txt strong{color:var(--amber-b);}\n.stall-opt{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--rule);cursor:pointer;}\n.stall-opt:last-of-type{border-bottom:none;}\n.so-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}\n.so-ico.empty-s{background:var(--green-xl);}\n.so-ico.occ-s{background:var(--amber-l);}\n.so-lbl{flex:1;}\n.so-name-s{font-size:12px;font-weight:500;color:var(--ink);}\n.so-meta-s{font-size:10px;color:var(--ink-3);margin-top:1px;}\n.so-meta-s.warn-s{color:var(--amber-b);font-weight:500;}\n.so-radio{width:18px;height:18px;border-radius:50%;border:2px city:0.35;cursor:not-allowed;}\n.pos-val{font-size:22px;font-weight:500;color:var(--ink);min-width:70px;text-align:center;}\n.pos-of{font-size:12px;color:var(--ink-3);font-weight:400;}\n\n.pos-context{background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:12px;}\n.pos-ctx-row{display:flex;align-items:center;gap:10px;padding:3px 0;font-size:11px;color:var(--ink-2);}\n.pos-ctx-n{display:inline-block;width:24px;font-variant-numeric:tabular-nums;color:var(--ink-3);font-size:10px;}\n.pos-ctx-name{color:var(--ink-2);}\n.pos-ctx-me{color:var(--ink);}\n.pos-ctx-me .pos-ctx-n{color:#1A5C38;font-weight:500;}\n\n.cb-primary{width:100%;height:42px;background:var(--green);border:none;border-radius:9px;font-size:13px;font-weight:500;color:#fff;cursor:pointer;font-family:\"DM Sans\",sans-serif;margin-bottom:7px;}\n.cb-secondary{width:100%;height:38px;background:#F5F5F5;border:none;border-radius:9px;font-size:12px;color:var(--ink-3);cursor:pointer;font-family:\"DM Sans\",sans-serif;margin-bottom:6px;}\n.cb-cancel{width:100%;height:34px;background:transparent;border:none;font-size:12px;color:var(--ink-3);cursor:pointer;font-family:\"DM Sans\",sans-serif;}\n\n.empty-state{padding:24px 14px;text-align:center;}\n.empty-lbl{font-size:12px;color:var(--ink-3);}\n.empty-sub{font-size:11px;color:var(--ink-3);opacity:.7;margin-top:4px;}\n\n.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 18px;border-radius:999px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:100;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none;}\n.toast.show{opacity:1;}\n.anim{animation:si .18s ease;}\n@keyframes si{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}\n\n/* Observer panel (facilitator-only) */\n.obs-panel{position:fixed;top:16px;right:16px;width:320px;max-height:calc(100vh - 32px);background:#0B2A23;color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.5);z-index:200;display:flex;flex-direction:column;font-family:\"DM Sans\",sans-serif;animation:si .2s ease;}\n.obs-head{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1);}\n.obs-eyebrow{font-size:9px;font-weight:600;color:#9FE1CB;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}\n.obs-title{font-family:\"DM Serif Display\",serif;font-size:17px;line-height:1.1;}\n.obs-close{background:none;border:none;color:#C8EEE3;font-size:22px;line-height:1;cursor:pointer;padding:0;width:24px;height:24px;}\n.obs-body{padding:12px 16px 16px;overflow-y:auto;}\n.obs-section{padding:10px 0;border-bottom:1px dashed rgba(255,255,255,.1);}\n.obs-section:last-of-type{border-bottom:none;}\n.obs-lbl{font-size:9px;font-weight:600;color:#9FE1CB;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}\n.obs-big{font-family:\"DM Serif Display\",serif;font-size:28px;color:#fff;margin-bottom:6px;}\n.obs-stats{display:flex;flex-wrap:wrap;gap:4px;}\n.obs-stat{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;border-radius:4px;background:rgba(255,255,255,.06);font-size:10px;}\n.obs-stat-n{font-family:\"DM Mono\",monospace;color:#9FE1CB;font-weight:500;}\n.obs-stat-k{color:#C8EEE3;}\n.obs-evt{display:grid;grid-template-columns:56px 90px 1fr;gap:6px;padding:4px 0;font-size:10px;align-items:baseline;border-bottom:.5px solid rgba(255,255,255,.05);}\n.obs-evt-t{color:rgba(255,255,255,.5);font-family:\"DM Mono\",monospace;font-size:9px;}\n.obs-evt-k{color:#9FE1CB;font-weight:500;}\n.obs-evt-d{color:rgba(255,255,255,.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.obs-empty{font-size:10px;color:rgba(255,255,255,.4);font-style:italic;padding:4px 0;}\n.obs-actions{display:flex;flex-direction:column;gap:5px;padding-top:4px;}\n.obs-btn{width:100%;height:34px;border-radius:7px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.04);color:#C8EEE3;font-size:11px;font-weight:500;cursor:pointer;font-family:\"DM Sans\",sans-serif;}\n.obs-btn:hover{background:rgba(255,255,255,.1);}\n.obs-btn.primary{background:#9FE1CB;border-color:#9FE1CB;color:#0B3D32;font-weight:600;}\n.obs-btn.primary:hover{filter:brightness(1.08);}\n.obs-btn.danger{color:#FCA5A5;border-color:rgba(220,38,38,.3);}\n.obs-hint{font-size:9px;color:rgba(255,255,255,.45);margin-top:10px;line-height:1.5;}\n.obs-hint kbd{background:rgba(255,255,255,.1);padding:1px 5px;border-radius:3px;font-family:\"DM Mono\",monospace;font-size:9px;}\n\n/* ========== Login screen ========== */\n.login{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:40;}\n.login-top{padding:28px 24px 0;}\n.login-eyebrow{font-size:9px;font-weight:500;color:var(--green-l);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}\n.login-date{font-size:11px;color:var(--ink-2);margin-bottom:22px;font-family:\"DM Mono\",monospace;}\n.login-h{font-family:\"DM Serif Display\",serif;font-size:30px;line-height:1.1;color:var(--ink);margin-bottom:6px;}\n.login-h em{font-style:italic;color:var(--green-l);}\n.login-sub{font-size:13px;color:var(--ink-2);line-height:1.4;max-width:260px;}\n.login-body{flex:1;padding:28px 24px 16px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;}\n.login-label{font-size:10px;font-weight:600;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;display:block;}\n.login-input{width:100%;height:46px;padding:0 14px;border:1.5px solid var(--rule);border-radius:10px;background:#fff;font-size:15px;font-family:\"DM Sans\",sans-serif;color:var(--ink);outline:none;transition:border-color .15s;}\n.login-input:focus{border-color:var(--green-b);}\n.login-input::placeholder{color:#B8B8B8;}\n.login-role-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}\n.login-role{height:46px;border:1.5px solid var(--rule);border-radius:10px;background:#fff;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;font-family:\"DM Sans\",sans-serif;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:0 8px;}\n.login-role:hover{border-color:var(--green-b);color:var(--ink);}\n.login-role.sel{border-color:var(--green-b);background:var(--green-xl);color:var(--green-l);}\n.login-age-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}\n.login-age{height:40px;border:1.5px solid var(--rule);border-radius:9px;background:#fff;font-size:12px;font-weight:500;color:var(--ink-2);cursor:pointer;font-family:\"DM Sans\",sans-serif;transition:all .12s;padding:0;}\n.login-age:hover{border-color:var(--green-b);color:var(--ink);}\n.login-age.sel{border-color:var(--green-b);background:var(--green-xl);color:var(--green-l);}\n.login-role-title{font-size:13px;font-weight:600;line-height:1.1;}\n.login-role-sub{font-size:9px;opacity:.7;line-height:1;}\n.login-context{background:var(--green-xl);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}\n.login-context-ico{font-size:16px;flex-shrink:0;margin-top:1px;}\n.login-context-txt{font-size:11px;color:var(--green-l);line-height:1.45;}\n.login-context-txt strong{color:var(--green);}\n.login-footer{padding:14px 24px 22px;border-top:.5px solid var(--rule);background:#fff;}\n.login-cta{width:100%;height:48px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:\"DM Sans\",sans-serif;transition:background .15s;}\n.login-cta:hover:not(:disabled){background:var(--green-l);}\n.login-cta:disabled{background:#C8C8C8;cursor:not-allowed;}\n.login-hint{text-align:center;font-size:10px;color:var(--ink-3);margin-top:10px;}\n\n/* ========== Post-session survey ==========\n   Two presentations:\n   - Narrow viewport (mobile/phone-only view): fills the phone frame like the login.\n   - Wide viewport (desktop, facilitator laptop): floats as a centered modal.\n   Controlled by .srv-wide class on the root. */\n.srv{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:45;overflow:hidden;}\n.srv.srv-wide{position:fixed;inset:0;background:rgba(12,28,24,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:32px 16px;z-index:100;}\n.srv-card{flex:1;display:flex;flex-direction:column;min-height:0;}\n.srv.srv-wide .srv-card{flex:initial;width:min(560px,100%);max-height:calc(100vh - 64px);background:#fff;border-radius:16px;box-shadow:0 32px 96px rgba(0,0,0,.35);overflow:hidden;}\n.srv-top{padding:28px 24px 0;}\n.srv-eyebrow{font-size:9px;font-weight:500;color:var(--green-l);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}\n.srv-h{font-family:\"DM Serif Display\",serif;font-size:26px;line-height:1.1;color:var(--ink);margin-bottom:8px;}\n.srv-h em{font-style:italic;color:var(--green-l);}\n.srv-sub{font-size:12px;color:var(--ink-2);line-height:1.5;max-width:280px;margin-bottom:4px;}\n.srv-body{flex:1;padding:22px 24px 16px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}\n.srv-q{}\n.srv-q-label{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:4px;line-height:1.35;}\n.srv-q-help{font-size:10px;color:var(--ink-3);margin-bottom:10px;line-height:1.4;}\n.srv-scale{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px;}\n.srv-scale-btn{height:46px;border:1.5px solid var(--rule);border-radius:9px;background:#fff;font-size:16px;font-weight:500;color:var(--ink-2);cursor:pointer;font-family:\"DM Sans\",sans-serif;transition:all .12s;display:flex;align-items:center;justify-content:center;padding:0;}\n.srv-scale-btn:hover{border-color:var(--green-b);}\n.srv-scale-btn.sel{border-color:var(--green-b);background:var(--green-xl);color:var(--green-l);font-weight:600;}\n.srv-scale-ends{display:flex;justify-content:space-between;font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}\n.srv-chips{display:flex;flex-wrap:wrap;gap:6px;}\n.srv-chip{padding:7px 11px;border:1.5px solid var(--rule);border-radius:18px;background:#fff;font-size:11px;color:var(--ink-2);cursor:pointer;font-family:\"DM Sans\",sans-serif;transition:all .12s;}\n.srv-chip:hover{border-color:var(--green-b);color:var(--ink);}\n.srv-chip.sel{border-color:var(--green-b);background:var(--green-xl);color:var(--green-l);font-weight:500;}\n.srv-textarea{width:100%;min-height:70px;padding:10px 12px;border:1.5px solid var(--rule);border-radius:9px;background:#fff;font-size:12px;font-family:\"DM Sans\",sans-serif;color:var(--ink);outline:none;resize:vertical;line-height:1.45;}\n.srv-textarea:focus{border-color:var(--green-b);}\n.srv-textarea::placeholder{color:#B8B8B8;}\n.srv-footer{padding:14px 24px 22px;border-top:.5px solid var(--rule);background:#fff;}\n.srv-cta{width:100%;height:46px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:\"DM Sans\",sans-serif;}\n.srv-cta:hover:not(:disabled){background:var(--green-l);}\n.srv-cta:disabled{background:#C8C8C8;cursor:not-allowed;}\n.srv-skip{width:100%;margin-top:8px;background:transparent;border:none;font-size:11px;color:var(--ink-3);cursor:pointer;font-family:\"DM Sans\",sans-serif;padding:6px;}\n.srv-thanks{padding:40px 28px;text-align:center;}\n.srv-thanks-ico{font-size:40px;margin-bottom:14px;}\n.srv-thanks-h{font-family:\"DM Serif Display\",serif;font-size:24px;color:var(--ink);margin-bottom:8px;}\n.srv-thanks-sub{font-size:12px;color:var(--ink-2);line-height:1.5;max-width:260px;margin:0 auto;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"header\">\n  <div><div class=\"h-org\">HMIS · Pinellas Hope<\u002Fdiv><div class=\"h-title\">Shower queue<\u002Fdiv><\u002Fdiv>\n  <div class=\"h-right\">\n    <div class=\"live-badge\"><div class=\"live-dot\"><\u002Fdiv><div class=\"live-txt\">Live<\u002Fdiv><\u002Fdiv>\n    <div class=\"sync-txt\">Synced just now<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"phone\" id=\"phone-wrap\">\n  <div id=\"phone\"><\u002Fdiv>\n  <div id=\"login-overlay\"><\u002Fdiv>\n<\u002Fdiv>\n<div id=\"survey-overlay\"><\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<script>\nvar activeTab = \"waiting\";\nvar pendingSheet = null; // {type:\"sendto\"|\"markout\", clientId?, stallIdx?}\nvar selectedStall = null;\n\nvar stalls = [];\n\nvar waiting = [\n  {id:\"C003\",name:\"Patricia Kim\",    flags:[\"mobility\"],           checkin:\"10:22 AM\",clothing:false},\n  {id:\"C001\",name:\"Diana Rivera\",    flags:[\"hearing\"],            checkin:\"10:28 AM\",clothing:true},\n  {id:\"C004\",name:\"George Allen\",    flags:[\"veteran\"],            checkin:\"10:31 AM\",clothing:true},\n  {id:\"C005\",name:\"Linda Martinez\",  flags:[\"hearing\",\"mobility\"], checkin:\"10:38 AM\",clothing:true},\n  {id:\"C006\",name:\"Robert Harris\",   flags:[],                     checkin:\"10:44 AM\",clothing:false},\n  {id:\"C007\",name:\"James Carter\",    flags:[],                     checkin:\"10:49 AM\",clothing:false},\n  {id:\"C010\",name:\"Maria Gonzales\",  flags:[\"mobility\"],           checkin:\"10:52 AM\",clothing:false},\n  {id:\"C011\",name:\"Andre Johnson\",   flags:[\"veteran\"],            checkin:\"10:55 AM\",clothing:true},\n  {id:\"C012\",name:\"Beatrice Nolan\",  flags:[],                     checkin:\"10:57 AM\",clothing:false},\n  {id:\"C013\",name:\"Carlos Mendes\",   flags:[\"hearing\"],            checkin:\"11:01 AM\",clothing:true},\n  {id:\"C014\",name:\"Elena Fischer\",   flags:[],                     checkin:\"11:03 AM\",clothing:false},\n  {id:\"C015\",name:\"Darnell Woods\",   flags:[\"veteran\",\"mobility\"], checkin:\"11:06 AM\",clothing:true},\n  {id:\"C016\",name:\"Sophia Laurent\",  flags:[],                     checkin:\"11:09 AM\",clothing:false},\n  {id:\"C017\",name:\"Kenji Watanabe\",  flags:[],                     checkin:\"11:12 AM\",clothing:true},\n  {id:\"C018\",name:\"Ruth Okonkwo\",    flags:[\"hearing\"],            checkin:\"11:14 AM\",clothing:false}\n];\nvar missed = [\n  {id:\"C002\",name:\"Marcus Thompson\",flags:[],checkin:\"10:18 AM\",clothing:true}\n];\nvar done = [\n  {id:\"C008\",name:\"Sarah Webb\",inTime:\"10:05 AM\",outTime:\"10:17 AM\",duration:\"12 min\",clothing:false},\n  {id:\"C009\",name:\"Tom Reyes\", inTime:\"10:08 AM\",outTime:\"10:22 AM\",duration:\"14 min\",clothing:true}\n];\n\nfunction getInitials(n){return n.split(\" \").map(function(w){return w[0];}).join(\"\").slice(0,2).toUpperCase();}\nfunction formatElapsed(ms){var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);return(m<10?\"0\":\"\")+m+\":\"+(s<10?\"0\":\"\")+s;}\nfunction elapsedClass(ms){var s=ms/1000;return s>=90?\"over\":s>=45?\"warn\":\"ok\";}\n\n// Live timer update\nsetInterval(function(){\n  stalls.forEach(function(s,i){\n    if(s&&s.inTs){\n      var ms=Date.now()-s.inTs;\n      var el=document.getElementById(\"el-\"+i);\n      var pill=document.getElementById(\"sp-\"+i);\n      if(el){el.textContent=formatElapsed(ms);el.className=\"sp-elapsed \"+elapsedClass(ms);}\n      if(pill){var ec=elapsedClass(ms);pill.className=\"stall-pill occ\"+(ec===\"warn\"?\" warn\":ec===\"over\"?\" over\":\"\");}\n    }\n  });\n},1000);\n\nfunction openSendTo(clientId){\n  pendingSheet={type:\"sendto\",clientId:clientId};\n  selectedStall=null;\n  render();\n}\nfunction openMarkOut(stallIdx){\n  pendingSheet={type:\"markout\",stallIdx:stallIdx};\n  render();\n}\nfunction selectStall(i){selectedStall=i;render();}\nfunction cancelAction(){pendingSheet=null;selectedStall=null;render();}\n\nfunction findClient(id){\n  var c = waiting.filter(function(x){return x.id===id;})[0];\n  if(c) return {client: c, source: \"waiting\"};\n  c = missed.filter(function(x){return x.id===id;})[0];\n  if(c) return {client: c, source: \"missed\"};\n  return null;\n}\nfunction removeClientFrom(source, id){\n  if(source===\"waiting\") waiting = waiting.filter(function(x){return x.id!==id;});\n  else if(source===\"missed\") missed = missed.filter(function(x){return x.id!==id;});\n}\n\nfunction confirmSendTo(){\n  if(selectedStall===null||!pendingSheet) return;\n  var i=selectedStall;\n  var found = findClient(pendingSheet.clientId);\n  if(!found) return;\n  var client = found.client;\n\n  // Auto close previous if occupied\n  if(stalls[i]){\n    var prev=stalls[i];\n    var outTime=new Date().toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n    var ms=Date.now()-prev.inTs;\n    done.unshift({id:prev.id,name:prev.name,inTime:prev.inTime,outTime:outTime,duration:Math.floor(ms/60000)+\" min\",clothing:prev.clothing});\n    if(prev.clothing) showToast(prev.name+\" auto-marked out \\u2014 clothing flagged \\uD83D\\uDEBF\");\n  }\n\n  var inTime=new Date().toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n  stalls[i]={id:client.id,name:client.name,flags:client.flags,inTime:inTime,inTs:Date.now(),clothing:client.clothing};\n  removeClientFrom(found.source, client.id);\n  showToast(client.name+\" sent to stall\"+(found.source===\"missed\"?\" (was missed)\":\"\"));\n  pendingSheet=null;selectedStall=null;\n  render();\n}\n\nfunction confirmMarkOut(){\n  if(!pendingSheet) return;\n  var i=pendingSheet.stallIdx;\n  var s=stalls[i];if(!s) return;\n  var outTime=new Date().toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n  var ms=Date.now()-s.inTs;\n  done.unshift({id:s.id,name:s.name,inTime:s.inTime,outTime:outTime,duration:Math.floor(ms/60000)+\" min\",clothing:s.clothing});\n  stalls[i]=null;\n  if(s.clothing) showToast(s.name+\" done \\u2014 clothing flagged \\uD83D\\uDEBF\");\n  else showToast(s.name+\" marked out\");\n  pendingSheet=null;\n  render();\n}\n\nfunction markMissed(id){\n  var c=null;\n  waiting=waiting.filter(function(x){if(x.id===id){c=x;return false;}return true;});\n  if(c){missed.push(c);showToast(c.name+\" marked missed\");render();}\n}\nfunction backInLine(id){\n  // Programmatic fallback \\u2014 defaults to end of line (used if anyone calls it directly)\n  var c=null;\n  missed=missed.filter(function(x){if(x.id===id){c=x;return false;}return true;});\n  if(c){waiting.push(c);showToast(c.name+\" back in queue\");render();}\n}\n\n// \"Back in line\" with volunteer-chosen position\nvar backInLinePos = 1; // 1-indexed position; set when opening\n\nfunction openBackInLine(id){\n  var c = missed.filter(function(x){return x.id===id;})[0];\n  if(!c) return;\n  // Sensible default: position 3 (or end of line if fewer than 3 waiting)\n  backInLinePos = Math.min(3, waiting.length + 1);\n  pendingSheet = {type:\"backinline\", clientId: id};\n  logEvent(\"open-back-in-line\", {clientId: id, queueLen: waiting.length});\n  render();\n}\n\nfunction setBackPos(p){\n  var max = waiting.length + 1;\n  backInLinePos = Math.max(1, Math.min(max, p));\n  render();\n}\n\nfunction setBackPosFromInput(v){\n  var n = parseInt(v, 10);\n  if(isNaN(n)) return;\n  setBackPos(n);\n}\n\nfunction confirmBackInLine(){\n  if(!pendingSheet || pendingSheet.type !== \"backinline\") return;\n  var id = pendingSheet.clientId;\n  var c = missed.filter(function(x){return x.id===id;})[0];\n  if(!c) return;\n  missed = missed.filter(function(x){return x.id !== id;});\n  var insertIdx = Math.max(0, Math.min(waiting.length, backInLinePos - 1));\n  waiting.splice(insertIdx, 0, c);\n  logEvent(\"back-in-line-placed\", {clientId: id, position: backInLinePos, queueLen: waiting.length});\n  showToast(c.name.split(\" \")[0]+\" placed at #\"+backInLinePos);\n  pendingSheet = null;\n  activeTab = \"waiting\"; // switch to Waiting so volunteer sees the result\n  render();\n}\nfunction addStall(){stalls.push(null);render();}\n\n// Setup flow (first-time stall configuration)\nvar stallSetupCount = 2; // default suggestion\n\nfunction openStallSetup(){\n  stallSetupCount = 2;\n  pendingSheet = {type:\"setup\", fromClientId: (pendingSheet && pendingSheet.clientId) || null};\n  logEvent(\"open-setup\", {fromClientId: pendingSheet.fromClientId});\n  render();\n}\n\nfunction setupCountChange(delta){\n  stallSetupCount = Math.max(1, Math.min(6, stallSetupCount + delta));\n  render();\n}\n\nfunction confirmStallSetup(){\n  var n = stallSetupCount;\n  for(var k = 0; k < n; k++) stalls.push(null);\n  logEvent(\"setup-stalls\", {count: n});\n\n  // If the user got here from trying to send a specific client, resume that flow\n  var fromClientId = pendingSheet && pendingSheet.fromClientId;\n  if(fromClientId){\n    pendingSheet = {type:\"sendto\", clientId: fromClientId};\n    selectedStall = 0; // pre-select the first new stall\n    showToast(n+\" stall\"+(n===1?\"\":\"s\")+\" set up \\u2014 confirm to send\");\n  } else {\n    pendingSheet = null;\n    selectedStall = null;\n    showToast(n+\" stall\"+(n===1?\"\":\"s\")+\" set up\");\n  }\n  render();\n}\n\nfunction addStallFromSheet(){\n  // Legacy name \\u2014 delegate to the full setup flow now\n  openStallSetup();\n}\nfunction confirmCloseStall(i){\n  if(stalls[i]){\n    // Occupied — shouldn't happen since hint only shows on empty, but guard\n    showToast(\"Mark client out first, then close stall\");\n    return;\n  }\n  pendingSheet = {type:\"closestall\", stallIdx: i};\n  logEvent(\"open-close-stall\", {stall: i+1});\n  render();\n}\n\nfunction doCloseStall(){\n  if(!pendingSheet || pendingSheet.type !== \"closestall\") return;\n  var i = pendingSheet.stallIdx;\n  stalls.splice(i, 1);\n  logEvent(\"close-stall\", {stall: i+1, remaining: stalls.length});\n  pendingSheet = null;\n  showToast(\"Stall closed (out of service)\");\n  render();\n}\n\nfunction removeStall(i){\n  if(stalls[i]){showToast(\"Mark client out first\");return;}\n  stalls.splice(i,1);render();\n}\nfunction setTab(t){activeTab=t;render();}\nfunction showToast(msg){\n  var t=document.getElementById(\"toast\");\n  t.innerHTML=msg;t.classList.add(\"show\");\n  setTimeout(function(){t.classList.remove(\"show\");},3000);\n}\n\nfunction render(){\n  var occupied=stalls.filter(function(s){return s!==null;}).length;\n  var h=\"\";\n\n  // Nav\n  h+=\"<div class='app-nav'><div class='nav-title'>Shower station<\u002Fdiv>\";\n  h+=\"<div class='nav-stats'>\";\n  h+=\"<span class='nav-stat'><span class='nav-stat-n'>\"+waiting.length+\"<\u002Fspan> waiting<\u002Fspan>\";\n  h+=\"<span class='nav-stat'><span class='nav-stat-n'>\"+occupied+\"/\"+stalls.length+\"<\u002Fspan> in stalls<\u002Fspan>\";\n  h+=\"<span class='nav-stat'><span class='nav-stat-n'>\"+done.length+\"<\u002Fspan> done<\u002Fspan>\";\n  h+=\"<\u002Fdiv><\u002Fdiv>\";\n\n  // Stalls — compact reference panel\n  h+=\"<div class='stalls-section'>\";\n  h+=\"<div class='stalls-hdr'><div class='stalls-lbl'>Stalls<\u002Fdiv><button class='add-btn' onclick='\"+(stalls.length===0?\"openStallSetup()\":\"addStall()\")+\"'>+ Add<\u002Fbutton><\u002Fdiv>\";\n  h+=\"<div class='stalls-row'>\";\n\n  stalls.forEach(function(s,i){\n    if(s){\n      var ms=Date.now()-s.inTs;\n      var ec=elapsedClass(ms);\n      h+=\"<div id='sp-\"+i+\"' class='stall-pill occ\"+(ec===\"warn\"?\" warn\":ec===\"over\"?\" over\":\"\")+\"'>\";\n      h+=\"<div class='sp-occ-body'><div class='sp-name'>\"+s.name.split(\" \")[0]+\"<\u002Fdiv>\";\n      var fl=\"\";\n      if(s.flags.indexOf(\"hearing\")>-1)  fl+=\"<span class='spf'>&#128263;<\u002Fspan>\";\n      if(s.flags.indexOf(\"mobility\")>-1) fl+=\"<span class='spf'>&#9855;<\u002Fspan>\";\n      if(fl) h+=\"<div class='sp-flags'>\"+fl+\"<\u002Fdiv>\";\n      h+=\"<\u002Fdiv>\";\n      h+=\"<div class='sp-times'><span class='sp-in'>\"+s.inTime+\"<\u002Fspan><span id='el-\"+i+\"' class='sp-elapsed \"+ec+\"'>\"+formatElapsed(ms)+\"<\u002Fspan><\u002Fdiv>\";\n      h+=\"<button class='sp-out-btn' onclick='openMarkOut(\"+i+\")'><div class='chk'><\u002Fdiv> Out<\u002Fbutton>\";\n      h+=\"<\u002Fdiv>\";\n    } else {\n      h+=\"<div class='stall-pill empty' onclick='confirmCloseStall(\"+i+\")'>\";\n      h+=\"<span class='sp-empty-ico'>&#128704;<\u002Fspan>\";\n      h+=\"<span class='sp-empty-lbl'>Empty<\u002Fspan>\";\n      h+=\"<span class='sp-close-hint'>Tap to close<\u002Fspan>\";\n      h+=\"<\u002Fdiv>\";\n    }\n  });\n  h+=\"<\u002Fdiv><\u002Fdiv>\";\n\n  // Queue\n  h+=\"<div class='queue-section'>\";\n  h+=\"<div class='q-tabs'>\";\n  h+=\"<div class='q-tab \"+(activeTab===\"waiting\"?\"act\":\"\")+\"' onclick='setTab(\\\"waiting\\\")'>Waiting <div class='tbdg tbdg-w'>\"+waiting.length+\"<\u002Fdiv><\u002Fdiv>\";\n  h+=\"<div class='q-tab \"+(activeTab===\"missed\"?\"act\":\"\")+\"' onclick='setTab(\\\"missed\\\")'>Missed <div class='tbdg tbdg-m'>\"+missed.length+\"<\u002Fdiv><\u002Fdiv>\";\n  h+=\"<div class='q-tab \"+(activeTab===\"done\"?\"act\":\"\")+\"' onclick='setTab(\\\"done\\\")'>Done <div class='tbdg tbdg-d'>\"+done.length+\"<\u002Fdiv><\u002Fdiv>\";\n  h+=\"<\u002Fdiv>\";\n\n  if(activeTab===\"waiting\"){\n    if(waiting.length){\n      waiting.forEach(function(c,idx){\n        var isNext=idx===0;\n        h+=\"<div class='q-card\"+(isNext?\" next-up\":\"\")+\" anim'>\";\n        h+=\"<div class='qc-top'>\";\n        h+=\"<div class='qc-pos \"+(isNext?\"next\":\"\")+\"'>\"+(idx+1)+\"<\u002Fdiv>\";\n        h+=\"<div style='flex:1;'><div class='qc-name'>\"+c.name+\"<\u002Fdiv><div class='qc-meta'>Check-in \"+c.checkin+\"<\u002Fdiv><\u002Fdiv>\";\n        h+=\"<\u002Fdiv>\";\n        var fl=\"\";\n        if(c.flags.indexOf(\"hearing\")>-1)  fl+=\"<div class='qcf qcf-h'>&#128263; Hearing<\u002Fdiv>\";\n        if(c.flags.indexOf(\"mobility\")>-1) fl+=\"<div class='qcf qcf-m'>&#9855; Mobility<\u002Fdiv>\";\n        if(c.flags.indexOf(\"veteran\")>-1)  fl+=\"<div class='qcf qcf-v'>&#9733; Veteran<\u002Fdiv>\";\n        if(c.clothing) fl+=\"<div class='qcf qcf-c'>&#128060; Clothing order<\u002Fdiv>\";\n        if(fl) h+=\"<div class='qc-flags'>\"+fl+\"<\u002Fdiv>\";\n        h+=\"<div class='qc-actions'>\";\n        h+=\"<button class='qca qca-send' onclick='openSendTo(\\\"\"+c.id+\"\\\")'><div class='chk'><\u002Fdiv> Send to stall<\u002Fbutton>\";\n        h+=\"<button class='qca qca-missed' onclick='markMissed(\\\"\"+c.id+\"\\\")'>Missed<\u002Fbutton>\";\n        h+=\"<\u002Fdiv><\u002Fdiv>\";\n      });\n    } else {\n      h+=\"<div class='empty-state'><div class='empty-lbl'>No one waiting<\u002Fdiv><\u002Fdiv>\";\n    }\n  } else if(activeTab===\"missed\"){\n    if(missed.length){\n      missed.forEach(function(c){\n        h+=\"<div class='q-card anim'><div class='qc-top'>\";\n        h+=\"<div class='qc-pos'>&mdash;<\u002Fdiv>\";\n        h+=\"<div style='flex:1;'><div class='qc-name'>\"+c.name+\"<\u002Fdiv><div class='qc-meta'>Check-in \"+c.checkin+\"<\u002Fdiv><\u002Fdiv>\";\n        h+=\"<\u002Fdiv>\";\n        var fl=\"\";\n        if(c.flags.indexOf(\"hearing\")>-1)  fl+=\"<div class='qcf qcf-h'>&#128263; Hearing<\u002Fdiv>\";\n        if(c.flags.indexOf(\"mobility\")>-1) fl+=\"<div class='qcf qcf-m'>&#9855; Mobility<\u002Fdiv>\";\n        if(fl) h+=\"<div class='qc-flags'>\"+fl+\"<\u002Fdiv>\";\n        h+=\"<div class='qc-actions'>\";\n        h+=\"<button class='qca qca-send' onclick='openSendTo(\\\"\"+c.id+\"\\\")'><div class='chk'><\u002Fdiv> Send to stall<\u002Fbutton>\";\n        h+=\"<button class='qca qca-back' onclick='openBackInLine(\\\"\"+c.id+\"\\\")'>Back in line&hellip;<\u002Fbutton>\";\n        h+=\"<\u002Fdiv>\";\n        h+=\"<\u002Fdiv>\";\n      });\n    } else {\n      h+=\"<div class='empty-state'><div class='empty-lbl'>No missed clients<\u002Fdiv><div class='empty-sub'>Everyone responded when called<\u002Fdiv><\u002Fdiv>\";\n    }\n  } else {\n    if(done.length){\n      done.forEach(function(c){\n        h+=\"<div class='done-card anim'><div class='dc-name'>\"+c.name+\"<\u002Fdiv>\";\n        h+=\"<div class='dc-times'><span class='dc-t'>In \"+c.inTime+\"<\u002Fspan><span class='dc-t'>  placeholder='e.g. I liked that\\u2026' oninput='updateSurveyText(\\\"easiestPart\\\", this.value)'>\"+escapeHtml(s.easiestPart)+\"<\u002Ftextarea>\";\n  h += \"<\u002Fdiv>\";\n\n  h += \"<div class='srv-q'>\";\n  h += \"<div class='srv-q-label'>What was confusing or frustrating?<\u002Fdiv>\";\n  h += \"<textarea class='srv-textarea' placeholder='Any moment you got stuck or had to guess\\u2026' oninput='updateSurveyText(\\\"confusingPart\\\", this.value)'>\"+escapeHtml(s.confusingPart)+\"<\u002Ftextarea>\";\n  h += \"<\u002Fdiv>\";\n\n  h += \"<div class='srv-q'>\";\n  h += \"<div class='srv-q-label'>Anything you looked for and couldn't find?<\u002Fdiv>\";\n  h += \"<textarea class='srv-textarea' placeholder='A button, info, or option you expected\\u2026' oninput='updateSurveyText(\\\"missingPart\\\", this.value)'>\"+escapeHtml(s.missingPart)+\"<\u002Ftextarea>\";\n  h += \"<\u002Fdiv>\";\n\n  h += \"<div class='srv-q'>\";\n  h += \"<div class='srv-q-label'>Anything else you want to share?<\u002Fdiv>\";\n  h += \"<textarea class='srv-textarea' placeholder='Optional \\u2014 open thoughts\\u2026' oninput='updateSurveyText(\\\"overall\\\", this.value)'><\u002Ftextarea>\";\n  h += \"<\u002Fdiv>\";\n\n  h += \"<\u002Fdiv>\";\n  h += \"<div class='srv-footer'>\";\n  h += \"<button id='srv-cta' class='srv-cta' type='button' onclick='submitSurvey()'\"+(canSubmit?\"\":\" disabled\")+\">Submit feedback<\u002Fbutton>\";\n  h += \"<button class='srv-skip' type='button' onclick='skipSurvey()'>Skip survey<\u002Fbutton>\";\n  h += \"<\u002Fdiv>\";\n  h += \"<\u002Fdiv>\"; // .srv-card\n  h += \"<\u002Fdiv>\"; // .srv\n  ov.innerHTML = h;\n}\n\nfunction renderSurveyThanks(){\n  var ov = document.getElementById(\"survey-overlay\");\n  if(!ov) return;\n  var wide = window.innerWidth >= 720;\n  ov.innerHTML = \"<div class='srv\"+(wide?\" srv-wide\":\"\")+\"'><div class='srv-card'><div class='srv-thanks'>\"+\n    \"<div class='srv-thanks-ico'>\\ud83c\\udf3f<\u002Fdiv>\"+\n    \"<div class='srv-thanks-h'>Thank you.<\u002Fdiv>\"+\n    \"<div class='srv-thanks-sub'>Your feedback is saved to the session log. You can close this tab, or let the facilitator take over.<\u002Fdiv>\"+\n    \"<\u002Fdiv><\u002Fdiv><\u002Fdiv>\";\n}\n\nfunction escapeHtml(s){\n  return (s||\"\").replace(/&/g,\"&amp;\").replace(/<\u002Fg,\"&lt;\").replace(/>/g,\"&gt;\").replace(/\"/g,\"&quot;\");\n}\n\n// Re-render survey on resize so narrow↔wide presentation flips correctly\nwindow.addEventListener(\"resize\", function(){\n  var ov = document.getElementById(\"survey-overlay\");\n  if(ov && ov.children.length && ov.querySelector(\".srv-thanks\")){\n    renderSurveyThanks();\n  } else if(ov && ov.children.length){\n    // Preserve in-progress answers by re-rendering from surveyState\n    renderSurvey();\n  }\n});\n\nfunction renderLogin(){\n  var ov = document.getElementById(\"login-overlay\");\n  if(!ov) return;\n  var draft = window.__volNameDraft || \"\";\n  var canSubmit = draft.trim().length >= 2 && !!selectedRole && !!selectedAge;\n  var h = \"\";\n  h += \"<div class='login'>\";\n  h += \"<div class='login-top'>\";\n  h += \"<div class='login-eyebrow'>HMIS \\u00b7 Pinellas Hope<\u002Fdiv>\";\n  h += \"<div class='login-date'>\" + getShiftLabel() + \"<\u002Fdiv>\";\n  h += \"<div class='login-h'>Good morning.<br><em>Sign in to start your shift.<\u002Fem><\u002Fdiv>\";\n  h += \"<\u002Fdiv>\";\n  h += \"<form class='login-body' onsubmit='submitLogin(event)'>\";\n  h += \"<div>\";\n  h += \"<label class='login-label' for='vol-name-inp'>Your name<\u002Flabel>\";\n  h += \"<input id='vol-name-inp' class='login-input' type='text' autocomplete='off' autocapitalize='words' spellcheck='false' placeholder='e.g. Jamie Rodriguez' value='\" + draft.replace(/'/g,\"&#39;\") + \"' oninput='handleNameInput(this.value)'>\";\n  h += \"<\u002Fdiv>\";\n  h += \"<div>\";\n  h += \"<label class='login-label'>Your role today<\u002Flabel>\";\n  h += \"<div class='login-role-row'>\";\n  var roles = [\n    {k:\"volunteer\", t:\"Volunteer\", s:\"Running showers\"},\n    {k:\"staff\",     t:\"Staff\",     s:\"Case manager\"}\n  ];\n  roles.forEach(function(r){\n    var sel = selectedRole === r.k ? \" sel\" : \"\";\n    h += \"<button type='button' class='login-role\" + sel + \"' onclick='selectRole(\\\"\" + r.k + \"\\\")'>\";\n    h += \"<span class='login-role-title'>\" + r.t + \"<\u002Fspan>\";\n    h += \"<span class='login-role-sub'>\" + r.s + \"<\u002Fspan>\";\n    h += \"<\u002Fbutton>\";\n  });\n  h += \"<\u002Fdiv><\u002Fdiv>\";\n\n  // Age range picker\n  h += \"<div>\";\n  h += \"<label class='login-label'>Your age range<\u002Flabel>\";\n  h += \"<div class='login-age-row'>\";\n  var ages = [\n    {k:\"under25\", t:\"Under 25\"},\n    {k:\"25-34\",   t:\"25\\u201334\"},\n    {k:\"35-44\",   t:\"35\\u201344\"},\n    {k:\"45-54\",   t:\"45\\u201354\"},\n    {k:\"55-64\",   t:\"55\\u201364\"},\n    {k:\"65plus\",  t:\"65+\"}\n  ];\n  ages.forEach(function(a){\n    var sel = selectedAge === a.k ? \" sel\" : \"\";\n    h += \"<button type='button' class='login-age\" + sel + \"' onclick='selectAge(\\\"\" + a.k + \"\\\")'>\" + a.t + \"<\u002Fbutton>\";\n  });\n  h += \"<\u002Fdiv><\u002Fdiv>\";\n\n  h += \"<div class='login-context'>\";\n  h += \"<div class='login-context-ico'>&#9749;<\u002Fdiv>\";\n  h += \"<div class='login-context-txt'>You're the <strong>first one in this morning.<\u002Fstrong> Clients are already checking in at the front desk. The shower area is quiet \\u2014 get things set up however you like.<\u002Fdiv>\";\n  h += \"<\u002Fdiv>\";\n  h += \"<\u002Fform>\";\n  h += \"<div class='login-footer'>\";\n  h += \"<button id='login-cta' class='login-cta' type='button' onclick='submitLogin()'\" + (canSubmit?\"\":\" disabled\") + \">Start shift &rarr;<\u002Fbutton>\";\n  h += \"<div class='login-hint'>Your actions today help us improve the tool.<\u002Fdiv>\";\n  h += \"<\u002Fdiv>\";\n  h += \"<\u002Fdiv>\";\n  ov.innerHTML = h;\n  setTimeout(function(){\n    var inp = document.getElementById(\"vol-name-inp\");\n    if(inp && !draft) inp.focus();\n  }, 50);\n}\n\n// Initial render\nif(VOLUNTEER_NAME && VOLUNTEER_ROLE){\n  window.__volNameDraft = VOLUNTEER_NAME;\n  selectedRole = VOLUNTEER_ROLE;\n  render();\n} else {\n  renderLogin();\n}\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
