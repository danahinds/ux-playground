<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMIS · Coordinator (Live)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-canvas:#F5F0E5;
  --bg-card:#FFFFFF;
  --bg-card-alt:#F1EFE8;
  --brand:#085041;
  --brand-deep:#063A2F;
  --brand-tint:#E5EFE9;
  --text-primary:#1A1A1A;
  --text-secondary:#5F5E5A;
  --text-tertiary:#8B8578;
  --text-light:#FBF7EE;
  --border:rgba(26,26,26,0.08);
  --border-strong:rgba(26,26,26,0.18);
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.18);

  --green:#085041;--green-l:#0F6E56;--green-xl:#E3F4EC;--green-b:#2D8653;
  --amber:#F59E0B;--amber-l:#FEF3C7;--amber-b:#B45309;
  --red:#DC2626;--red-l:#FEE2E2;
  --bg:#F0EFEB;--card:#fff;--ink:#111111;--ink-2:#595959;--ink-3:#595959;
  --rule:#E8E8E8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg-canvas);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 40px;-webkit-font-smoothing:antialiased;}

/* Topbar */
.topbar{width:100%;background:var(--bg-canvas);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;margin-bottom:24px;}
.topbar-inner{max-width:460px;margin:0 auto;padding:14px 0;display:flex;align-items:center;gap:16px;}
.brand-mark{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;}
.brand-logo{width:32px;height:32px;background:var(--brand);color:var(--text-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:"DM Serif Display",Georgia,serif;font-size:16px;}
.brand-text{font-size:14px;font-weight:500;line-height:1.1;color:var(--text-primary);}
.brand-text small{display:block;font-weight:400;color:var(--text-tertiary);font-size:11px;margin-top:2px;}
.dev-toggle{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-tertiary);font-family:"DM Mono",monospace;}
.dev-toggle button{background:#fff;border:1px solid var(--rule);color:var(--text-secondary);padding:5px 10px;border-radius:999px;font-size:11px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;}
.dev-toggle button.active{background:var(--brand);color:#fff;border-color:var(--brand);}

.phone{width:100%;max-width:380px;min-height:660px;background:var(--bg);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;position:relative;}

/* Phone surface */
.dash{flex:1;display:flex;flex-direction:column;background:var(--bg-canvas);overflow-y:auto;padding-bottom:64px;}
.dash-body{padding:18px 18px 24px;display:flex;flex-direction:column;gap:0;}

/* Compact info-line greeting */
.info-line{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:18px;}
.info-name{font-family:"DM Serif Display",serif;font-size:18px;color:var(--text-primary);line-height:1;}
.info-name em{font-style:italic;color:var(--brand);}
.info-meta{font-size:11px;color:var(--text-tertiary);font-family:"DM Mono",monospace;text-align:right;line-height:1.3;}

/* Hero — mode-aware. Live = deep green. Planning = cream. */
.hero{border-radius:var(--radius-xl);padding:22px 22px 20px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);}
.hero-mark{position:absolute;top:18px;right:20px;font-size:48px;line-height:1;opacity:.12;font-family:"DM Serif Display",serif;}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-family:"DM Mono",monospace;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.hero-date{font-family:"DM Mono",monospace;font-size:13px;font-weight:500;margin-bottom:6px;letter-spacing:.02em;}
.hero-title{font-family:"DM Serif Display",serif;font-size:26px;line-height:1.1;margin-bottom:8px;letter-spacing:-.005em;}
.hero-sub{font-size:13px;line-height:1.5;margin-bottom:16px;}
.hero-cta{width:100%;height:48px;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:transform .12s,box-shadow .12s;}
.hero-cta:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.14);}
.hero-live{background:linear-gradient(160deg, var(--brand) 0%, var(--brand-deep) 100%);color:#fff;}
.hero-tappable{cursor:pointer;transition:transform .12s,box-shadow .12s;}
.hero-tappable:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg);}
.hero-live .hero-eyebrow{color:#A0DDC8;}
.hero-live .hero-date{color:#C8EEE3;}
.hero-live .hero-sub{color:#E5F4ED;}
.hero-live .hero-cta{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);color:#fff;}
.hero-live .hero-cta:hover{background:rgba(255,255,255,.24);}
.hero-live .live-pulse-dot{background:#A0DDC8;animation:livepulse 1.6s ease-in-out infinite;}

/* Embedded stats inside live hero — replaces the standalone live stats panel */
.hero-embedded-stats{display:flex;background:rgba(0,0,0,.22);border-radius:var(--radius-md);overflow:hidden;margin-top:14px;}
.hero-embedded-stat{flex:1;padding:11px 4px 9px;text-align:center;}
.hero-embedded-stat+.hero-embedded-stat{border-left:1px solid rgba(255,255,255,.12);}
.hero-embedded-stat-n{font-family:"DM Serif Display",serif;font-size:24px;line-height:1;color:#fff;letter-spacing:-.005em;}
.hero-embedded-stat-lbl{font-size:9px;font-weight:600;color:#C8EEE3;text-transform:uppercase;letter-spacing:.07em;margin-top:5px;}
.hero-planning{background:#F5EFE0;color:var(--text-primary);}
.hero-planning .hero-eyebrow{color:var(--brand);}
.hero-planning .hero-date{color:var(--text-secondary);}
.hero-planning .hero-sub{color:var(--text-secondary);}
.hero-planning .hero-cta{background:var(--brand);color:#fff;}
.hero-planning .hero-cta:hover{background:var(--brand-deep);}

/* Pre-event hero — event scheduled today, awaiting open */
.hero-scheduled{background:linear-gradient(160deg, #FFE6B0 0%, #F2CD7A 100%);color:#5C3D08;border:1px solid #E5C088;}
.hero-scheduled .hero-eyebrow{color:#8C5F1A;letter-spacing:.12em;}
.hero-scheduled .hero-date{color:#7A4F0E;}
.hero-scheduled .hero-sub{color:#5C3D08;}
.hero-scheduled-actions{display:grid;grid-template-columns:2fr 1fr;gap:6px;}
.hero-scheduled-actions .hero-cta{height:46px;font-size:14px;}
.hero-scheduled-actions .hero-cta.primary{background:var(--brand);color:#fff;border:none;}
.hero-scheduled-actions .hero-cta.primary:hover{background:var(--brand-deep);}
.hero-scheduled-actions .hero-cta.secondary{background:transparent;border:1.5px solid #B8861A;color:#5C3D08;}
.hero-scheduled-actions .hero-cta.secondary:hover{background:rgba(184,134,26,.1);}

/* Closed event hero — event wrapped up */
.hero-closed{background:linear-gradient(160deg, #5F5E5A 0%, #3A3A38 100%);color:#fff;}
.hero-closed .hero-eyebrow{color:#C8C4BC;letter-spacing:.12em;}
.hero-closed .hero-date{color:#C8C4BC;}
.hero-closed .hero-sub{color:#E5E3DD;}
.hero-closed .hero-cta{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);color:#fff;}
.hero-closed .hero-cta:hover{background:rgba(255,255,255,.24);}
.hero-closed-stats{display:flex;background:rgba(0,0,0,.22);border-radius:var(--radius-md);overflow:hidden;margin:14px 0 16px;}
.hero-closed-stat{flex:1;padding:10px 4px;text-align:center;}
.hero-closed-stat+.hero-closed-stat{border-left:1px solid rgba(255,255,255,.12);}
.hero-closed-stat-n{font-family:"DM Serif Display",serif;font-size:24px;line-height:1;color:#fff;}
.hero-closed-stat-lbl{font-size:9px;font-weight:600;color:#C8C4BC;text-transform:uppercase;letter-spacing:.07em;margin-top:5px;}

/* Close-event prompt card — appears on home when end time reached */
.close-prompt{background:#FFF1E0;border:1.5px solid #D4A55F;border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;}
.close-prompt-tag{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #B8861A;color:#7A4F0E;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:999px;margin-bottom:10px;}
.close-prompt-title{font-family:"DM Serif Display",serif;font-size:18px;line-height:1.2;color:#3D2806;margin-bottom:4px;}
.close-prompt-msg{font-size:13px;color:#5C3D08;line-height:1.5;margin-bottom:14px;}
.close-prompt-actions{display:grid;grid-template-columns:2fr 1fr;gap:6px;}
.close-prompt-actions button{height:42px;border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;border:none;}
.close-prompt-actions .btn-close{background:var(--brand);color:#fff;}
.close-prompt-actions .btn-close:hover{background:var(--brand-deep);}
.close-prompt-actions .btn-stay{background:transparent;border:1.5px solid #B8861A;color:#5C3D08;}
.close-prompt-actions .btn-stay:hover{background:rgba(184,134,26,.1);}

/* End event — quiet section at bottom of live event detail */
.end-event-wrap{margin-top:32px;padding-top:18px;border-top:1px solid var(--rule);text-align:center;}
.btn-end-event{background:transparent;border:1.5px solid #B8861A;color:#7A4F0E;height:42px;padding:0 28px;border-radius:var(--radius-md);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .12s;}
.btn-end-event:hover{background:rgba(184,134,26,.08);}
.end-event-hint{font-size:11px;color:var(--text-tertiary);margin-top:8px;font-style:italic;}

/* Working-station hero — coordinator is leading a station */
.hero-working{background:linear-gradient(160deg, #064E40 0%, #032F26 100%);color:#fff;border:1px solid rgba(255,255,255,.08);}
.hero-working .hero-eyebrow{color:#FFD27A;letter-spacing:.12em;}
.hero-working .hero-eyebrow .live-pulse-dot{background:#FFD27A;animation:ambpulse 1.6s ease-in-out infinite;}
.hero-working .hero-date{color:#C8EEE3;}
.hero-working .hero-sub{color:#E5F4ED;}
.hero-working-stats{display:flex;background:rgba(0,0,0,.22);border-radius:var(--radius-md);overflow:hidden;margin-bottom:14px;}
.hero-working-stat{flex:1;padding:10px 4px;text-align:center;}
.hero-working-stat+.hero-working-stat{border-left:1px solid rgba(255,255,255,.12);}
.hero-working-stat-n{font-family:"DM Serif Display",serif;font-size:20px;line-height:1;color:#fff;}
.hero-working-stat-lbl{font-size:9px;font-weight:600;color:#C8EEE3;text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}
.hero-working-actions{display:grid;grid-template-columns:2fr 1fr;gap:6px;}
.hero-working-actions .hero-cta{height:42px;font-size:13px;}
.hero-working-actions .hero-cta.secondary{background:transparent;border:1px solid rgba(255,255,255,.32);color:#FFD27A;}
.hero-working-actions .hero-cta.secondary:hover{background:rgba(255,210,122,.12);}
.live-pulse-dot{display:inline-block;}
@keyframes livepulse{
  0%,100%{box-shadow:0 0 0 0 rgba(160,221,200,0.5);}
  50%{box-shadow:0 0 0 5px rgba(160,221,200,0);}
}
@keyframes ambpulse{
  0%,100%{box-shadow:0 0 0 0 rgba(180,83,9,0.5);}
  50%{box-shadow:0 0 0 5px rgba(180,83,9,0);}
}

/* Section labels */
.sec-lbl{font-size:10px;font-weight:600;color:var(--text-tertiary);letter-spacing:.09em;text-transform:uppercase;margin:8px 0 9px;display:flex;align-items:center;gap:8px;}
.sec-lbl > span:first-child{margin-right:auto;}
.sec-lbl::after{content:"";flex:1;height:1px;background:var(--border);order:99;}
.sec-lbl > .see-all-link{order:100;}

/* Live stats panel */
.live-stats{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px;}
.live-stats-hdr{padding:9px 14px;background:var(--brand-tint);border-bottom:1.5px solid var(--brand-b);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.live-stats-lbl{font-size:11px;font-weight:600;color:var(--brand);text-transform:uppercase;letter-spacing:.07em;}
.live-stats-pulse{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--brand);text-transform:uppercase;letter-spacing:.08em;}
.live-stats-pulse .live-pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--brand);}
.live-stats-body{display:flex;}
.live-stats-cell{flex:1;padding:13px 4px 11px;text-align:center;}
.live-stats-cell+.live-stats-cell{border-left:1px solid var(--rule);}
.live-stats-cell-n{font-family:"DM Serif Display",serif;font-size:26px;line-height:1;color:var(--brand);letter-spacing:-.01em;}
.live-stats-cell-lbl{font-size:9px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-top:5px;}

/* Quick actions row */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:18px;}

/* Stations overview card — replaces quick action tiles when live */
.stations-card{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:18px;}
.stations-card-hdr{padding:9px 14px;background:var(--bg-card-alt);border-bottom:1.5px solid var(--rule);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.stations-card-lbl{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;}
.stations-card-meta{font-size:10px;color:var(--text-tertiary);font-family:"DM Mono",monospace;}
.stations-card-body{display:flex;flex-direction:column;}
.station-card-row{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-top:1px solid var(--rule);transition:background .12s;}
.station-card-row:first-child{border-top:none;}
.station-card-row:hover{background:var(--bg-card-alt);}
.station-card-row.busy{background:#FFF5E0;}
.station-card-row.busy:hover{background:#FCEBC9;}
.station-card-row.slow{background:#EFF6FA;}
.station-card-row.slow:hover{background:#E2EEF5;}
.station-card-name{flex:1;min-width:0;}
.station-card-name-text{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.2;}
.station-card-name-text.busy{color:var(--amber-b);}
.station-card-name-text.slow{color:#3A6F8F;}
.station-card-name-meta{font-size:11px;color:var(--text-secondary);margin-top:2px;font-family:"DM Mono",monospace;letter-spacing:.02em;}
.station-card-status{flex-shrink:0;display:flex;align-items:center;gap:6px;}
.station-card-pip{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.station-card-pip.steady{background:var(--brand);}
.station-card-pip.busy{background:var(--amber-b);animation:ambpulse 1.6s ease-in-out infinite;}
.station-card-pip.slow{background:#5C9BC2;}
.station-card-arrow{color:var(--text-tertiary);font-size:14px;flex-shrink:0;}
.station-card-row.busy .station-card-arrow{color:var(--amber-b);}
.station-card-row.slow .station-card-arrow{color:#5C9BC2;}

/* Volunteer line — quiet info below stations card */
.vol-line{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:transparent;border:1px solid transparent;border-radius:var(--radius-md);font-size:12px;color:var(--text-secondary);cursor:pointer;font-family:"DM Sans",sans-serif;width:100%;text-align:left;margin-bottom:14px;transition:background .12s,border-color .12s;}
.vol-line:hover{background:#fff;border-color:var(--rule);}
.vol-line-text{flex:1;}
.vol-line-text strong{color:var(--text-primary);font-weight:600;}
.vol-line-arrow{color:var(--text-tertiary);font-size:13px;flex-shrink:0;}

/* Station detail page — investigation surface */
.station-hero{border-radius:var(--radius-lg);padding:18px 18px 16px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);}
.station-hero.calm{background:#fff;border:1.5px solid var(--rule);color:var(--text-primary);}
.station-hero.calm .station-hero-eyebrow{color:var(--brand);}
.station-hero.calm .station-hero-pip{background:var(--brand);}
.station-hero.slow{background:linear-gradient(160deg, #EFF6FA 0%, #DCEAF2 100%);border:1.5px solid #B5D2E2;color:#2A4A60;}
.station-hero.slow .station-hero-eyebrow{color:#3A6F8F;}
.station-hero.slow .station-hero-pip{background:#5C9BC2;}
.station-hero.attn{background:linear-gradient(160deg, #FCEBC9 0%, #F5C76A 100%);border:1.5px solid #B8861A;color:#3D2806;}
.station-hero.attn .station-hero-eyebrow{color:#7A4F0E;}
.station-hero.attn .station-hero-pip{background:var(--amber-b);animation:ambpulse 1.6s ease-in-out infinite;}
.station-hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-family:"DM Mono",monospace;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.station-hero-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.station-hero-title{font-family:"DM Serif Display",serif;font-size:28px;line-height:1.05;margin-bottom:4px;letter-spacing:-.005em;}
.station-hero-meta{font-size:12px;opacity:.85;margin-bottom:12px;}
.station-hero-stats{display:flex;background:rgba(0,0,0,.06);border-radius:var(--radius-md);overflow:hidden;}
.station-hero-stat{flex:1;padding:11px 4px 9px;text-align:center;}
.station-hero-stat+.station-hero-stat{border-left:1px solid rgba(0,0,0,.08);}
.station-hero-stat-n{font-family:"DM Serif Display",serif;font-size:22px;line-height:1;}
.station-hero-stat-lbl{font-size:9px;font-weight:600;opacity:.7;text-transform:uppercase;letter-spacing:.07em;margin-top:5px;}

/* Station detail action buttons */
.station-actions{display:grid;grid-template-columns:1fr;gap:6px;margin:14px 0 18px;}
.station-actions.split{grid-template-columns:2fr 1fr;}
.station-actions button{height:48px;border-radius:var(--radius-md);font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.station-actions button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.station-actions .btn-join{background:var(--brand);color:#fff;}
.station-actions .btn-join:hover{background:var(--brand-deep);}
.station-actions .btn-step-away{background:transparent;border:1.5px solid var(--amber-b);color:var(--amber-b);}
.station-actions .btn-step-away:hover{background:var(--amber-l);}
.station-actions .btn-reassign{background:#fff;border:1.5px solid var(--rule);color:var(--text-primary);}
.station-actions .btn-reassign:hover{border-color:var(--brand);}
.station-actions .btn-coordinator{background:var(--brand-tint);border:1.5px solid var(--brand-b);color:var(--brand);}
.station-actions .btn-coordinator:hover{background:#D4E6DD;border-color:var(--brand);}

/* Activity placeholder */
.activity-placeholder{padding:14px 16px;background:var(--bg-card-alt);border:1px dashed var(--rule);border-radius:var(--radius-md);text-align:center;font-size:11px;color:var(--text-tertiary);font-style:italic;line-height:1.5;}

/* Queue placeholder — shown when coordinator is leading. Real queue tool would render here. */
.queue-placeholder{background:var(--brand-tint);border:2px dashed var(--brand-b);border-radius:var(--radius-lg);padding:24px 20px;margin-bottom:16px;text-align:center;}
.queue-placeholder-tag{display:inline-block;background:var(--brand);color:#fff;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:999px;margin-bottom:14px;font-family:"DM Mono",monospace;}
.queue-placeholder-title{font-family:"DM Serif Display",serif;font-size:22px;line-height:1.1;color:var(--brand);margin-bottom:8px;}
.queue-placeholder-msg{font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:14px;font-style:italic;}
.queue-placeholder-meta{display:inline-block;font-size:11px;color:var(--brand);font-weight:600;font-family:"DM Mono",monospace;letter-spacing:.04em;background:#fff;border:1px solid var(--brand-b);padding:5px 12px;border-radius:999px;}
.qa-btn{height:46px;background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;color:var(--text-primary);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .12s;}
.qa-btn:hover{border-color:var(--brand);background:var(--brand-tint);}
.qa-btn-meta{font-size:10px;color:var(--text-tertiary);font-weight:400;}
.qa-btn.warn{border-color:var(--amber-b);background:var(--amber-l);color:var(--amber-b);}
.qa-btn.warn .qa-btn-meta{color:var(--amber-b);opacity:.75;}
.qa-btn.warn:hover{background:#FCD9A0;}

/* Check-in alert */
.checkin-alert{background:#FCEBC9;border:1.5px solid #E5C088;border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;cursor:pointer;}
.checkin-alert-tag{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--amber-b);color:var(--amber-b);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:999px;margin-bottom:10px;}
.checkin-alert-tag-dot{width:5px;height:5px;border-radius:50%;background:var(--amber-b);animation:ambpulse 1.6s ease-in-out infinite;}
.checkin-row{display:flex;align-items:center;gap:10px;}
.avatar{display:flex;align-items:center;justify-content:center;font-family:"DM Sans",sans-serif;font-weight:600;flex-shrink:0;}
.avatar-md{width:36px;height:36px;border-radius:50%;font-size:12px;}
.avatar-sm{width:30px;height:30px;border-radius:50%;font-size:11px;}
.avatar-lg{width:44px;height:44px;border-radius:50%;font-size:14px;}
.avatar-amber{background:#F5C76A;color:#5C3D08;}
.avatar-green{background:var(--brand-tint);color:var(--brand);}
.checkin-name{font-size:14px;font-weight:600;color:var(--text-primary);line-height:1.2;}
.checkin-meta{font-size:11px;color:var(--text-secondary);margin-top:2px;}

/* Calendar-chip event row */
.evt-row{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);padding:10px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s;}
.evt-row:hover{border-color:var(--brand);}
.evt-chip{flex-shrink:0;width:46px;height:46px;border-radius:8px;background:var(--bg-card-alt);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;}
.evt-chip-mo{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);}
.evt-chip-d{font-family:"DM Serif Display",serif;font-size:20px;color:var(--text-primary);margin-top:2px;}
.evt-rest{flex:1;min-width:0;}
.evt-rest-name{font-size:13px;font-weight:500;color:var(--text-primary);line-height:1.25;}
.evt-rest-meta{font-size:10px;color:var(--text-tertiary);margin-top:2px;font-family:"DM Mono",monospace;letter-spacing:.02em;}
.evt-rest-arrow{color:var(--text-tertiary);font-size:14px;flex-shrink:0;}

.evt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}

/* Status pill (for past/upcoming chip in headers) */
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.pill-upcoming{background:var(--brand-tint);color:var(--brand);}
.pill-completed{background:#F5F5F5;color:var(--text-secondary);}
.pill-live{background:var(--brand);color:#fff;}
.pill-confirmed{background:var(--brand-tint);color:var(--brand);border:1px solid var(--brand-b);}
.pill-pending{background:var(--amber-l);color:var(--amber-b);border:1px solid var(--amber-b);}
.pill-on-pace{background:var(--brand-tint);color:var(--brand);border:1px solid var(--brand-b);}
.pill-warn{background:var(--amber-l);color:var(--amber-b);border:1px solid var(--amber-b);}
.pill-slow{background:#EFF6FA;color:#3A6F8F;border:1px solid #B5D2E2;}

.pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;}

/* Volunteer row */
.vol-row{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);padding:9px 12px;display:flex;align-items:center;gap:10px;}
.vol-row.tappable{cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.vol-row.tappable:hover{border-color:var(--brand);box-shadow:0 1px 3px rgba(8,80,65,.08);}
.vol-row.tappable:hover .vol-row-arrow{color:var(--brand);transform:translateX(2px);}
.vol-row-body{flex:1;min-width:0;}
.vol-name{font-size:13px;font-weight:500;color:var(--text-primary);line-height:1.2;}
.vol-meta{font-size:10px;color:var(--text-tertiary);margin-top:2px;font-family:"DM Mono",monospace;letter-spacing:.02em;}
.vol-row-arrow{color:var(--text-tertiary);font-size:18px;flex-shrink:0;line-height:1;font-weight:600;transition:color .12s,transform .12s;margin-left:2px;}

/* Bottom tab nav */
.bot-tabs{position:absolute;bottom:0;left:0;right:0;height:64px;background:#fff;border-top:1px solid var(--rule);display:flex;z-index:30;}
.bot-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-tertiary);transition:color .15s;padding:8px 4px 10px;}
.bot-tab.active{color:var(--brand);}
.bot-tab svg{width:18px;height:18px;flex-shrink:0;}
.bot-tab-lbl{font-size:10px;font-weight:500;font-family:"DM Sans",sans-serif;}
.bot-tab.active .bot-tab-lbl{font-weight:600;}
.bot-tab-badge{position:absolute;top:7px;right:50%;margin-right:-22px;background:var(--amber-b);color:#fff;font-size:9px;font-weight:600;padding:2px 5px;border-radius:999px;line-height:1;min-width:14px;text-align:center;}

/* Tab sub-nav inside Volunteers */
.subtabs{display:flex;background:#fff;border:1.5px solid var(--rule);border-radius:999px;padding:3px;margin-bottom:14px;}
.subtab{flex:1;height:32px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;font-weight:500;color:var(--text-secondary);border-radius:999px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:background .12s;}
.subtab.active{background:var(--brand);color:#fff;}
.subtab-count{font-size:10px;opacity:.8;}
.subtab.active .subtab-count{opacity:1;}

/* Search field */
.search-field{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);padding:10px 12px;margin-bottom:12px;}
.search-input{flex:1;border:none;outline:none;background:transparent;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text-primary);}
.search-input::placeholder{color:var(--text-tertiary);}
.search-clear{background:transparent;border:none;color:var(--text-tertiary);font-size:14px;cursor:pointer;padding:0 4px;line-height:1;font-family:"DM Sans",sans-serif;}
.search-clear:hover{color:var(--text-secondary);}

.station-group{margin-bottom:14px;}
.station-group-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:6px 4px;margin-bottom:6px;border-bottom:1px solid var(--rule);}
.station-group-name{font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;color:var(--text-primary);text-transform:uppercase;letter-spacing:.06em;}
.station-group-name.warn{color:var(--amber-b);}
.station-group-name.floating{color:var(--brand);}
.station-group-meta{font-size:10px;color:var(--text-tertiary);font-family:"DM Mono",monospace;letter-spacing:.02em;}
.station-group-rows{display:flex;flex-direction:column;gap:5px;}
.search-empty{padding:24px 16px;text-align:center;font-size:12px;color:var(--text-tertiary);font-style:italic;}

/* Collapsible section header — tappable with chevron */
.collapse-hdr{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:"DM Sans",sans-serif;width:100%;text-align:left;margin-bottom:10px;transition:border-color .12s;}
.collapse-hdr:hover{border-color:var(--brand);}
.collapse-hdr-title{flex:1;font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.2;}
.collapse-hdr-meta{font-size:11px;color:var(--text-tertiary);font-family:"DM Mono",monospace;margin-right:6px;}
.collapse-chevron{font-size:14px;color:var(--text-tertiary);transition:transform .15s;line-height:1;flex-shrink:0;}
.collapse-chevron.open{transform:rotate(90deg);}
.collapse-content{margin-bottom:14px;animation:expand .2s ease;}
@keyframes expand{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}

/* Event detail */
.detail-back{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-tertiary);cursor:pointer;background:none;border:none;font-family:"DM Sans",sans-serif;padding:0;margin-bottom:6px;}
.detail-back:hover{color:var(--text-secondary);}
.detail-title{font-family:"DM Serif Display",serif;font-size:24px;line-height:1.1;margin-bottom:4px;}
.detail-sub{font-size:12px;color:var(--text-secondary);margin-bottom:18px;}

.detail-stats{display:flex;background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px;}
.detail-stats-cell{flex:1;padding:12px 4px 10px;text-align:center;}
.detail-stats-cell+.detail-stats-cell{border-left:1px solid var(--rule);}
.detail-stats-n{font-family:"DM Serif Display",serif;font-size:22px;line-height:1;color:var(--brand);}
.detail-stats-lbl{font-size:9px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-top:5px;}

.station-row{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);padding:10px 12px;display:flex;align-items:center;gap:10px;}
.station-row.warn{border-color:var(--amber-b);background:var(--amber-l);}
.station-row-body{flex:1;min-width:0;}
.station-row-name{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.2;}
.station-row-meta{font-size:11px;color:var(--text-secondary);margin-top:2px;}
.cap-dots{display:flex;gap:3px;flex-shrink:0;}
.cap-dot{width:8px;height:8px;border-radius:50%;}
.cap-dot.cap-filled{background:var(--brand);}
.cap-dot.cap-empty{background:#fff;border:1.5px solid var(--rule);}
.cap-dot.cap-empty-warn{background:#fff;border:1.5px solid var(--amber-b);}
.result-num{font-family:"DM Serif Display",serif;font-size:18px;color:var(--brand);flex-shrink:0;line-height:1;min-width:24px;text-align:right;}

/* Past event hero */
.hero-impact{background:linear-gradient(160deg, var(--brand) 0%, var(--brand-deep) 100%);color:#fff;border-radius:var(--radius-lg);padding:22px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow-md);}
.hero-impact-num{font-family:"DM Serif Display",serif;font-size:54px;line-height:1;letter-spacing:-.02em;}
.hero-impact-lbl{font-size:13px;font-weight:500;color:#C8EEE3;margin-top:4px;letter-spacing:.04em;}
.hero-impact-sub{font-size:11px;color:#A0DDC8;margin-top:6px;}

/* Buttons */
.btn-primary{width:100%;height:46px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:background .15s;}
.btn-primary:hover{background:var(--brand-deep);}
.btn-secondary{width:100%;height:46px;background:#fff;border:1.5px solid var(--rule);color:var(--text-primary);border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;}
.btn-secondary:hover{border-color:var(--text-secondary);}
.btn-amber{width:100%;height:46px;background:var(--amber-b);color:#fff;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.btn-amber:hover{background:#8C3F08;}
.btn-amber:disabled{background:#D8C8A8;cursor:not-allowed;}

.button-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:auto;padding-top:18px;}

/* Form fields */
.field{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);padding:9px 12px;margin-bottom:10px;}
.field-lbl{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.field-val{font-size:13px;color:var(--text-primary);font-weight:500;}
.field-input{width:100%;border:none;outline:none;background:transparent;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text-primary);font-weight:500;padding:0;}

.chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;border:1.5px solid;}
.chip-on{background:var(--brand);color:#fff;border-color:var(--brand);}
.chip-off{background:#fff;color:var(--text-secondary);border-color:var(--rule);}
.chip-off:hover{border-color:var(--brand);color:var(--brand);}

/* Sheet (overlay for assign / reassign / send-reminder / create-event) */
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s;}
.sheet-backdrop.open{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--bg-canvas);border-radius:var(--radius-xl) var(--radius-xl) 0 0;z-index:41;transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.7,.3,1);max-height:88%;overflow-y:auto;display:flex;flex-direction:column;}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:rgba(0,0,0,.18);border-radius:999px;margin:8px auto 4px;flex-shrink:0;}
.sheet-body{padding:14px 18px 22px;flex:1;display:flex;flex-direction:column;}
.sheet-title{font-family:"DM Serif Display",serif;font-size:22px;line-height:1.1;margin-bottom:4px;}
.sheet-sub{font-size:12px;color:var(--text-secondary);margin-bottom:16px;line-height:1.4;}
.sheet-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.06);border:none;color:var(--text-secondary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:"DM Sans",sans-serif;z-index:42;}
.sheet-close:hover{background:rgba(0,0,0,.12);}

/* Station picker grid (for assign + reassign sheets) */
.station-picker-lbl{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;margin-top:4px;}
.station-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.station-opt{padding:11px 10px;background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-md);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;color:var(--text-primary);cursor:pointer;text-align:left;transition:all .12s;}
.station-opt:hover{border-color:var(--brand);}
.station-opt.selected{background:var(--brand);color:#fff;border-color:var(--brand);}
.station-opt-meta{font-size:10px;font-weight:400;color:var(--text-tertiary);margin-top:2px;}
.station-opt.selected .station-opt-meta{color:#C8EEE3;}
.station-opt:disabled{opacity:.5;cursor:not-allowed;}

/* Vol focus card (in reassign sheet) */
.focus-card{background:#fff;border:1.5px solid var(--rule);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}

/* Login overlay */
.login{position:absolute;inset:0;background:var(--bg-canvas);padding:36px 22px 28px;display:flex;flex-direction:column;z-index:60;}
/* Hard guarantee: login overlay is only ever visible when state is login.
   Without this, edge-case race conditions can cause the empty wrapper to
   intercept touches and visually appear over the app. */
#login-overlay{display:none;}
#login-overlay:not(:empty){display:flex;position:absolute;inset:0;z-index:60;}
.login-eyebrow{font-size:11px;font-weight:500;color:var(--text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;font-family:"DM Mono",monospace;}
.login-h{font-family:"DM Serif Display",serif;font-size:26px;line-height:1.15;margin-bottom:6px;}
.login-h em{font-style:italic;color:var(--brand);}
.login-sub{font-size:13px;color:var(--text-secondary);line-height:1.4;margin-bottom:24px;}
.login-form{display:flex;flex-direction:column;flex:1;}
.login-label{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.04em;text-transform:uppercase;margin-bottom:7px;display:block;}
.login-input{width:100%;height:46px;padding:0 14px;border:1.5px solid var(--rule);border-radius:var(--radius-md);background:#fff;font-size:15px;font-family:"DM Sans",sans-serif;color:var(--text-primary);outline:none;transition:border-color .15s;}
.login-input:focus{border-color:var(--brand);}
.login-hint{font-size:11px;color:var(--text-tertiary);margin-top:6px;line-height:1.4;}
.login-spacer{flex:1;min-height:24px;}
.login-cta{width:100%;height:50px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-md);font-size:15px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;transition:background .15s;}
.login-cta:hover{background:var(--brand-deep);}
.login-cta:disabled{background:#D8D8D8;cursor:not-allowed;}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:100;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}

/* Live event banner — appears on every screen except live event detail itself */
.live-banner{position:absolute;top:0;left:0;right:0;background:linear-gradient(90deg, var(--brand) 0%, var(--brand-deep) 100%);color:#fff;padding:9px 14px;font-size:12px;font-weight:500;align-items:center;gap:9px;cursor:pointer;z-index:32;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:background .2s;display:none;}
.live-banner-dot{width:7px;height:7px;border-radius:50%;background:#A0DDC8;flex-shrink:0;animation:livepulse 1.6s ease-in-out infinite;}
.live-banner-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
.live-banner-text strong{font-weight:600;}
.live-banner-arrow{flex-shrink:0;font-size:14px;color:#A0DDC8;line-height:1;}
.live-banner.urgent{background:linear-gradient(90deg, var(--amber-b) 0%, #8C3F08 100%);}
.live-banner.urgent .live-banner-dot{background:#FFE5B0;animation:ambpulse 1.2s ease-in-out infinite;}
.live-banner.urgent .live-banner-arrow{color:#FFE5B0;}
.dash.has-banner{padding-top:36px;}

/* Empty state */
.empty{padding:32px 20px;text-align:center;}
.empty-mark{font-size:32px;opacity:.3;margin-bottom:10px;}
.empty-title{font-family:"DM Serif Display",serif;font-size:18px;color:var(--text-primary);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--text-secondary);line-height:1.5;}

.anim{animation:si .25s ease;}
@keyframes si{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none;}}

<script>
/* ============================================================
   Coordinator app — user test prototype
   Architecture:
     - 4 bottom tabs: Home / Events / Volunteers / Reports
     - Home is data-aware: shows live event when one's running, else planning view
     - Sheets handle focused tasks: assign volunteer, reassign, send reminder, create event
     - Sub-tabs inside Volunteers: All / Confirmed / Pending
     - Drill-in pages: event detail (upcoming + past variants)
   ============================================================ */

// ---- Mock data ----
var DATA_MODE = "live"; // locked — this is the live test file

var EVENT_TODAY = {
  id:"e0", name:"Friday Outreach", loc:"Main Pavilion",
  startTime:"9:00 AM", endTime:"12:00 PM",
  startedAgo:"Live &middot; 14 min",
  status:"scheduled" // "scheduled" | "open" | "closed" — coordinator owns transitions
};

// Service-centric stats — "47 services · 23 waiting · 12 clients"
// services = total service transactions delivered (one client may use 2-3 stations)
// waiting = clients currently in any queue
// clients = unique people served today
// volunteers = on-site team count (informational secondary)
var STATS_LIVE = { services:47, waiting:23, clients:12, volunteers:7, rostered:12 };

// Station status: "slow" | "steady" | "busy"
// NOTE: detection of slow/busy requires data we don't capture yet — currently demo placeholder
var STATIONS_LIVE = [
  {id:"showers",  name:"Showers",     vols:2, queue:4, status:"steady"},
  {id:"clothes",  name:"Clothes",     vols:2, queue:3, status:"steady"},
  {id:"haircuts", name:"Haircuts",    vols:2, queue:1, status:"slow"},
  {id:"meal",     name:"Meal",        vols:1, queue:6, status:"busy"}
];

var ASSIGNED_VOLS = [
  // Floating support — no station assignment, available for any need

// ---- Helpers ----
function isValidCredential(v){
  v = (v||"").trim();
  if(v.length < 4) return false;
  if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return true;
  var digits = v.replace(/\D/g,"");
  return digits.length >= 7;
}
function deriveName(v){
  v = (v||"").trim();
  if(v.indexOf("@")>0){
    var local = v.split("@")[0].split(/[._-]/)[0];
    return local.charAt(0).toUpperCase() + local.slice(1);
  }
  return "Sarah";
}
function firstName(n){return (n||"").split(" ")[0];}

function stationName(id){
  var s = STATIONS_LIVE.filter(function(x){return x.id===id;})[0];
  return s ? s.name : "—";
}
function stationById(id){
  return STATIONS_LIVE.filter(function(x){return x.id===id;})[0];
}

function eventIsLiveToday(){
  return DATA_MODE === "live" && EVENT_TODAY.status === "open";
}
function eventIsScheduledToday(){
  return DATA_MODE === "live" && EVENT_TODAY.status === "scheduled";
}
function eventIsClosedToday(){
  return DATA_MODE === "live" && EVENT_TODAY.status === "closed";
}

function backedUpCount(){
  // Legacy alias — counts busy stations
  return STATIONS_LIVE.filter(function(s){return s.status==="busy";}).length;
}
function busyCount(){
  return STATIONS_LIVE.filter(function(s){return s.status==="busy";}).length;
}
function slowCount(){
  return STATIONS_LIVE.filter(function(s){return s.status==="slow";}).length;
}
function statusLabel(status){
  if(status === "busy") return "Busy";
  if(status === "slow") return "Slow";
  return "Steady";
}

// Recompute every station's status. Single source of truth — placeholder logic;
// real impl would use throughput trends, wait time, etc.
function recomputeStationStates(){
  STATIONS_LIVE.forEach(function(s){
    var ratio = s.queue / Math.max(s.vols, 1);
    if(ratio > 3){
      s.status = "busy";
    } else if(s.queue <= 1){
      s.status = "slow";
    } else {
      s.status = "steady";
    }
  });
}

function showToast(msg){
  var t = document.getElementById("toast");
  t.innerHTML = msg;
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");}, 2400);
}

// Returns true if banner is visible (so dash can add padding)
function renderLiveBanner(){
  var banner = document.getElementById("live-banner");
  if(!banner) return false;
  // Hide banner if no live event today, or if user is currently viewing the live event itself
  if(!eventIsLiveToday()){
    banner.style.display = "none";
    return false;
  }
  if(state === "event_detail" && detailEventId === "e0"){
    banner.style.display = "none";
    return false;
  }
  // Determine urgency
  var bu = backedUpCount();
  var pendingCount = INCOMING_VOLS.length;
  var isUrgent = (pendingCount > 0) || (bu > 0);

  banner.classList.toggle("urgent", isUrgent);
  banner.style.display = "flex";

  var workingSt = coordWorkingStation ? stationById(coordWorkingStation) : null;
  var prefix = workingSt ? "<strong>At " + workingSt.name + "</strong>" : "<strong>" + EVENT_TODAY.name + "</strong>";

  var text = "";
  if(pendingCount > 0 && bu > 0){
    text = prefix + " &middot; " + pendingCount + " waiting to assign &middot; " + bu + " station" + (bu===1?"":"s") + " busy";
  } else if(pendingCount > 0){
    if(pendingCount === 1){
      text = prefix + " &middot; " + INCOMING_VOLS[0].name + " just checked in";
    } else {
      text = prefix + " &middot; " + pendingCount + " volunteers waiting to assign";
    }
  } else if(bu > 0){
    text = prefix + " &middot; " + bu + " station" + (bu===1?"":"s") + " busy";
  } else {
    // Calm state
    text = prefix + " &middot; " + STATS_LIVE.services + " services &middot; " + STATS_LIVE.waiting + " waiting";
  }

  banner.innerHTML =
    "<span class='live-banner-dot'></span>" +
    "<span class='live-banner-text'>" + text + "</span>" +
    "<span class='live-banner-arrow'>&rsaquo;</span>";
  return true;
}

// ---- Sheets ----
function openSheet(type, opts){
  sheetType = type;
  opts = opts || {};
  if(type === "reassign"){
    reassignVolId = opts.volId;
    reassignTargetId = null;
  }
  if(type === "assign"){
    pendingStation = null;
    pendingAssignVolId = opts.volId || (INCOMING_VOLS[0] && INCOMING_VOLS[0].id);
    if(!pendingAssignVolId) return; // nothing to assign
  }
  if(type === "work_station"){
    pendingWorkStation = null;
  }
  sheetOpen = true;
  renderSheet();
}
function closeSheet(){
  sheetOpen = false;
  sheetType = null;
  pendingStation = null;
  pendingAssignVolId = null;
  pendingWorkStation = null;
  reassignVolId = null;
  reassignTargetId = null;
  var bk = document.getElementById("sheet-backdrop");
  var sh = document.getElementById("sheet");
  if(bk) bk.classList.remove("open");
  if(sh) sh.classList.remove("open");
}
function pickStation(s){
  pendingStation = s;
  renderSheet();
}
function confirmAssign(){
  if(!pendingStation || !pendingAssignVolId) return;
  var inVol = INCOMING_VOLS.filter(function(v){return v.id === pendingAssignVolId;})[0];
  if(!inVol) return;
  var isFloating = pendingStation === "_floating";
  var st = isFloating ? null : stationById(pendingStation);
  ASSIGNED_VOLS.unshift({
    id:"v" + (ASSIGNED_VOLS.length + 1),
    initials:inVol.initials,
    name:inVol.name,
    stationId:isFloating ? null : st.id,
    since:inVol.arrivedAt
  });
  // Remove from incoming
  INCOMING_VOLS = INCOMING_VOLS.filter(function(v){return v.id !== pendingAssignVolId;});
  if(st){
    st.vols++;
    recomputeStationStates();
  }
  STATS_LIVE.volunteers++;
  showToast(inVol.name + " assigned to " + (isFloating ? "floating support" : st.name));
  closeSheet();
  render();
}
function pickReassignTarget(s){ reassignTargetId = s; renderSheet(); }
function confirmReassign(){
  if(!reassignTargetId || !reassignVolId) return;
  var v = ASSIGNED_VOLS.filter(function(x){return x.id === reassignVolId;})[0];
  if(!v) return;
  var movingToFloating = reassignTargetId === "_floating";
  if((!movingToFloating && v.stationId === reassignTargetId) ||
     (movingToFloating && v.stationId === null)) return;
  var fromSt = stationById(v.stationId);
  var toSt = movingToFloating ? null : stationById(reassignTargetId);
  if(fromSt) fromSt.vols = Math.max(0, fromSt.vols - 1);
  if(toSt) toSt.vols++;
  recomputeStationStates();
  v.stationId = movingToFloating ? null : reassignTargetId;
  showToast(v.name + " moved to " + (movingToFloating ? "floating support" : toSt.name));
  closeSheet();
  render();
}

// ---- Coordinator-working-station handlers ----
function pickWorkStation(id){ pendingWorkStation = id; renderSheet(); }
function confirmWorkStation(){
  if(!pendingWorkStation) return;
  var st = stationById(pendingWorkStation);
  if(!st) return;
  coordWorkingStation = st.id;
  // Use real time for "started X min ago"
  var now = new Date();
  var hh = now.getHours();
  var mm = now.getMinutes();
  var ampm = hh >= 12 ? "PM" : "AM";
  var hh12 = (hh % 12) || 12;
  coordStartedAt = hh12 + ":" + (mm < 10 ? "0" : "") + mm + " " + ampm;
  // Coordinator counts as a volunteer at the station
  st.vols++;
  recomputeStationStates();
  showToast("You're now leading " + st.name);
  closeSheet();
  render();
}
function stepAwayFromStation(){
  if(!coordWorkingStation) return;
  var st = stationById(coordWorkingStation);
  if(st){
    st.vols = Math.max(0, st.vols - 1);
    recomputeStationStates();
  }
  var stationName = st ? st.name : "station";
  coordWorkingStation = null;
  coordStartedAt = null;
  showToast("Stepped away from " + stationName);
  render();
}

// ----- STATION DETAIL — investigation + Join/Step away surface -----
function renderStationDetail(){
  var h = "";
  var st = stationById(detailStationId);
  if(!st){ navTo("home"); return ""; }

  var iAmHere = (coordWorkingStation === st.id);
  // Hero treatment is based purely on the station's status — leading no longer
  // changes the visual mode. Coordinator's role is shown by her row in the volunteer list.
  var heroCls;
  if(st.status === "busy") heroCls = "attn";
  else if(st.status === "slow") heroCls = "slow";
  else heroCls = "calm";

  // Back button — context-aware
  var backTab = detailFrom || "home";
  var backLabel = backTab === "events" ? "Events" : (backTab === "volunteers" ? "Volunteers" : "Home");
  h += "<button class='detail-back' onclick='navTo(\"" + backTab + "\")'>&lsaquo; " + backLabel + "</button>";

  // Hero — three flavors based on station status: calm/steady, slow, busy
  h += "<div class='station-hero " + heroCls + "'>";
  h += "<div class='station-hero-eyebrow'><span class='station-hero-pip'></span> " + statusLabel(st.status) + "</div>";
  h += "<div class='station-hero-title'>" + st.name + "</div>";
  h += "<div class='station-hero-meta'>" + EVENT_TODAY.name + " &middot; " + EVENT_TODAY.loc + "</div>";
  h += "<div class='station-hero-stats'>";
  h += "<div class='station-hero-stat'><div class='station-hero-stat-n'>" + st.queue + "</div><div class='station-hero-stat-lbl'>Waiting</div></div>";
  h += "<div class='station-hero-stat'><div class='station-hero-stat-n'>" + st.vols + "</div><div class='station-hero-stat-lbl'>" + (st.vols===1?"Volunteer":"Volunteers") + "</div></div>";
  // Demo: services-at-this-station number — placeholder; real impl would track per-station
  var stServed = Math.max(1, Math.floor(STATS_LIVE.services / STATIONS_LIVE.length));
  h += "<div class='station-hero-stat'><div class='station-hero-stat-n'>" + stServed + "</div><div class='station-hero-stat-lbl'>Services</div></div>";
  h += "</div>";
  h += "</div>";

  // Primary actions — Join or Step away, plus context action
  h += "<div class='station-actions split'>";
  if(iAmHere){
    h += "<button class='btn-step-away' onclick='stepAwayFromStation()'>Step away from " + st.name + "</button>";
    h += "<button class='btn-coordinator' onclick='openEventDetail(\"e0\",\"home\")'>Back to coordinating</button>";
  } else {
    h += "<button class='btn-join' onclick='joinStationFromDetail(\"" + st.id + "\")'>&#9733; Join this station</button>";
    h += "<button class='btn-reassign' onclick='navTo(\"volunteers\")'>Reassign</button>";
  }
  h += "</div>";

  // Queue tool placeholder — only when leading. The real queue tool for this
  // station would render here. Each station has its own workflow (showers vs
  // clothes vs haircuts vs meal) so building the actual UIs is its own scope.
  if(iAmHere){
    h += "<div class='queue-placeholder'>";
    h += "<div class='queue-placeholder-tag'>Queue here</div>";
    h += "<div class='queue-placeholder-title'>" + st.name + " queue</div>";
    h += "<div class='queue-placeholder-msg'>The volunteer&rsquo;s queue tool for " + st.name + " would render here &mdash; check-ins, next-up, and station-specific workflow.</div>";
    h += "<div class='queue-placeholder-meta'>" + st.queue + " waiting</div>";
    h += "</div>";
  }

  // Activity placeholder — flow data not yet captured
  h += "<div class='sec-lbl'><span>Recent activity</span></div>";
  h += "<div class='activity-placeholder'>";
  h += "Throughput trends, wait-time, and upstream/downstream signals will land here.<br>";
  h += "We don&rsquo;t capture this data yet.";
  h += "</div>";

  return h;
}

  var qEsc = (volSearchQuery || "").replace(/"/g,"&quot;");
  h += "<div class='search-field'>";
  h += "<svg width='14' height='14' viewBox='0 0 14 14' fill='none' stroke='currentColor' stroke-width='1.5'><circle cx='6' cy='6' r='4'/><path d='M9.5 9.5L13 13' stroke-linecap='round'/></svg>";
  h += "<input class='search-input' type='text' placeholder='Search by name' value=\"" + qEsc + "\" oninput='handleVolSearch(this.value)'>";
  if(volSearchQuery){
    h += "<button class='search-clear' onclick='clearVolSearch()' aria-label='Clear search'>&times;</button>";
  }
  h += "</div>";

  // Sub-tabs
  var liveCount = ASSIGNED_VOLS.length;
  var confirmedCount = VOLUNTEERS_ROSTER.filter(function(v){return v.status==='confirmed';}).length;
  var pendingCount = VOLUNTEERS_ROSTER.filter(function(v){return v.status==='pending';}).length;
  var allCount = liveCount + confirmedCount + pendingCount;
  h += "<div class='subtabs'>";
  h += "<div class='subtab " + (volSubtab==='all'?'active':'') + "' onclick='setVolSubtab(\"all\")'>All <span class='subtab-count'>&middot; " + allCount + "</span></div>";
  if(eventIsLiveToday()){
    h += "<div class='subtab " + (volSubtab==='live'?'active':'') + "' onclick='setVolSubtab(\"live\")'>On-site <span class='subtab-count'>&middot; " + liveCount + "</span></div>";
  }
  h += "<div class='subtab " + (volSubtab==='confirmed'?'active':'') + "' onclick='setVolSubtab(\"confirmed\")'>Confirmed <span class='subtab-count'>&middot; " + confirmedCount + "</span></div>";
  h += "<div class='subtab " + (volSubtab==='pending'?'active':'') + "' onclick='setVolSubtab(\"pending\")'>Pending <span class='subtab-count'>&middot; " + pendingCount + "</span></div>";
  h += "</div>";

  // Filter helper — match against name (case-insensitive)
  var q = (volSearchQuery || "").trim().toLowerCase();
  function nameMatches(v){
    if(!q) return true;
    return v.name.toLowerCase().indexOf(q) >= 0;
  }

  var resultCount = 0;
  var contentHtml = "";

  // ===== On-site (Live + All sub-tabs) — grouped by station, Floating Support on top =====
  if(volSubtab === "all" || volSubtab === "live"){
    if(eventIsLiveToday() && ASSIGNED_VOLS.length){
      // Floating Support first
      var floating = ASSIGNED_VOLS.filter(function(v){return v.stationId === null && nameMatches(v);});
      if(floating.length){
        contentHtml += "<div class='station-group'>";
        contentHtml += "<div class='station-group-hdr'>";
        contentHtml += "<div class='station-group-name floating'>&#9733; Floating support</div>";
        contentHtml += "<div class='station-group-meta'>" + floating.length + " available</div>";
        contentHtml += "</div>";
        contentHtml += "<div class='station-group-rows'>";
        floating.forEach(function(v){
          contentHtml += "<div class='vol-row tappable' onclick='openSheet(\"reassign\",{volId:\"" + v.id + "\"})'>";
          contentHtml += "<div class='avatar avatar-sm avatar-amber'>" + v.initials + "</div>";
          contentHtml += "<div class='vol-row-body'>";
          contentHtml += "<div class='vol-name'>" + v.name + "</div>";
          contentHtml += "<div class='vol-meta'>Floating &middot; available since " + v.since + "</div>";
          contentHtml += "</div>";
          contentHtml += "<span class='pill pill-live'>On-site</span>";
          contentHtml += "<span class='vol-row-arrow' aria-label='Reassign'>&rsaquo;</span>";
          contentHtml += "</div>";
        });
        contentHtml += "</div>";
        contentHtml += "</div>";
        resultCount += floating.length;
      }
      // Then by station
      STATIONS_LIVE.forEach(function(st){
        var rows = ASSIGNED_VOLS.filter(function(v){return v.stationId === st.id && nameMatches(v);});
        if(rows.length === 0) return;
        var warnCls = st.status === "busy" ? " warn" : "";
        var glyph = st.status === "busy" ? "&#9888;&#65039; " : "";
        contentHtml += "<div class='station-group'>";
        contentHtml += "<div class='station-group-hdr'>";
        contentHtml += "<div class='station-group-name" + warnCls + "'>" + glyph + st.name + "</div>";
        contentHtml += "<div class='station-group-meta'>" + rows.length + " vol" + (rows.length===1?"":"s") + " &middot; " + st.queue + " in queue &middot; " + statusLabel(st.status).toLowerCase() + "</div>";
        contentHtml += "</div>";
        contentHtml += "<div class='station-group-rows'>";
        rows.forEach(function(v){
          contentHtml += "<div class='vol-row tappable' onclick='openSheet(\"reassign\",{volId:\"" + v.id + "\"})'>";
          contentHtml += "<div class='avatar avatar-sm avatar-amber'>" + v.initials + "</div>";
          contentHtml += "<div class='vol-row-body'>";
          contentHtml += "<div class='vol-name'>" + v.name + "</div>";
          contentHtml += "<div class='vol-meta'>At " + st.name + " &middot; since " + v.since + "</div>";
          contentHtml += "</div>";
          contentHtml += "<span class='pill pill-live'>On-site</span>";
          contentHtml += "<span class='vol-row-arrow' aria-label='Reassign'>&rsaquo;</span>";
          contentHtml += "</div>";
        });
        contentHtml += "</div>";
        contentHtml += "</div>";
        resultCount += rows.length;
      });
    }
  }

  // ===== Confirmed (All + Confirmed sub-tabs) — flat list, no station grouping (RSVP for future) =====
  if(volSubtab === "all" || volSubtab === "confirmed"){
    var confirmed = VOLUNTEERS_ROSTER.filter(function(v){return v.status==='confirmed' && nameMatches(v);});
    if(confirmed.length){
      if(volSubtab === "all"){
        contentHtml += "<div class='station-group'>";
        contentHtml += "<div class='station-group-hdr'>";
        contentHtml += "<div class='station-group-name'>Confirmed for upcoming events</div>";
        contentHtml += "<div class='station-group-meta'>" + confirmed.length + "</div>";
        contentHtml += "</div>";
        contentHtml += "<div class='station-group-rows'>";
      } else {
        contentHtml += "<div style='display:flex;flex-direction:column;gap:5px;margin-bottom:14px;'>";
      }
      confirmed.forEach(function(v){
        contentHtml += "<div class='vol-row'>";
        contentHtml += "<div class='avatar avatar-sm avatar-green'>" + v.initials + "</div>";
        contentHtml += "<div class='vol-row-body'>";
        contentHtml += "<div class='vol-name'>" + v.name + "</div>";
        contentHtml += "<div class='vol-meta'>" + v.meta + "</div>";
        contentHtml += "</div>";
        contentHtml += "<span class='pill pill-confirmed'>Confirmed</span>";
        contentHtml += "</div>";
      });
      contentHtml += volSubtab === "all" ? "</div></div>" : "</div>";
      resultCount += confirmed.length;
    }
  }

  // ===== Pending (All + Pending sub-tabs) — flat list =====
  if(volSubtab === "all" || volSubtab === "pending"){
    var pending = VOLUNTEERS_ROSTER.filter(function(v){return v.status==='pending' && nameMatches(v);});
    if(pending.length){
      if(volSubtab === "all"){
        contentHtml += "<div class='station-group'>";
        contentHtml += "<div class='station-group-hdr'>";
        contentHtml += "<div class='station-group-name'>Invited &middot; not replied</div>";
        contentHtml += "<div class='station-group-meta'>" + pending.length + "</div>";
        contentHtml += "</div>";
        contentHtml += "<div class='station-group-rows'>";
      } else {
        contentHtml += "<div style='display:flex;flex-direction:column;gap:5px;margin-bottom:14px;'>";
      }
      pending.forEach(function(v){
        contentHtml += "<div class='vol-row'>";
        contentHtml += "<div class='avatar avatar-sm avatar-green'>" + v.initials + "</div>";
        contentHtml += "<div class='vol-row-body'>";
        contentHtml += "<div class='vol-name'>" + v.name + "</div>";
        contentHtml += "<div class='vol-meta'>" + v.meta + "</div>";
        contentHtml += "</div>";
        contentHtml += "<span class='pill pill-pending'>Pending</span>";
        contentHtml += "</div>";
      });
      contentHtml += volSubtab === "all" ? "</div></div>" : "</div>";
      resultCount += pending.length;
    }
  }

  // Empty state when search returns nothing
  if(resultCount === 0){
    if(q){
      h += "<div class='search-empty'>No volunteers match &ldquo;" + qEsc + "&rdquo;</div>";
    } else {
      h += "<div class='search-empty'>No volunteers in this view yet.</div>";
    }
  } else {
    h += contentHtml;
  }

  h += "<button class='btn-primary' onclick='showToast(\"Invite flow coming soon\")'>+ Invite volunteers</button>";
  return h;
}
function setVolSubtab(t){ volSubtab = t; render(); }
function handleVolSearch(v){ volSearchQuery = v; render(); }
function clearVolSearch(){ volSearchQuery = ""; render(); }
function toggleConfirmedVols(){ confirmedVolsExpanded = !confirmedVolsExpanded; render(); }

    h += "<button class='station-opt' style='text-align:left;'>Lead pastor<div class='station-opt-meta'>Reverend Hill</div></button>";
    h += "<button class='station-opt' style='text-align:left;'>Custom recipients<div class='station-opt-meta'>Pick from your contacts</div></button>";
    h += "</div>";
    h += "<div class='field-lbl' style='margin-bottom:6px;'>Add a note (optional)</div>";
    h += "<div class='field' style='padding:10px 12px;'><textarea class='field-input' rows='2' placeholder='e.g. Great event this week — thanks to everyone who served.' style='width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:13px;color:var(--text-primary);resize:none;'></textarea></div>";
    h += "<div class='login-spacer' style='flex:1;min-height:8px;'></div>";
    h += "<button class='btn-primary' onclick='confirmSendReport()'>Send report</button>";
  }

  else if(sheetType === "create_event"){
    h += "<div class='sheet-title'>New event</div>";
    h += "<div class='sheet-sub'>Set up a recurring outreach event.</div>";
    h += "<div class='field'><div class='field-lbl'>Event name</div><input class='field-input' type='text' placeholder='e.g. Friday Outreach' value=''></div>";
    h += "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;'>";
    h += "<div class='field'><div class='field-lbl'>Date</div><input class='field-input' type='text' placeholder='May 15' value=''></div>";
    h += "<div class='field'><div class='field-lbl'>Start</div><input class='field-input' type='text' placeholder='9:00 AM' value=''></div>";
    h += "</div>";
    h += "<div class='field'><div class='field-lbl'>Location</div><input class='field-input' type='text' placeholder='Main Pavilion' value=''></div>";
    h += "<div class='station-picker-lbl' style='margin-top:6px;'>Stations</div>";
    h += "<div style='display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;'>";
    h += "<span class='chip chip-on'>Showers</span>";
    h += "<span class='chip chip-on'>Clothes</span>";
    h += "<span class='chip chip-on'>Haircuts</span>";
    h += "<span class='chip chip-on'>Meal</span>";
    h += "<span class='chip chip-off'>+ Add</span>";
    h += "</div>";
    h += "<button class='btn-primary' onclick='confirmCreateEvent()'>Create event</button>";
  }

  h += "</div>";
  sh.innerHTML = h;
}

  h += "<div class='login-eyebrow'>HMIS &middot; Pinellas Hope</div>";
  h += "<div class='login-h'>Coordinator <em>sign in</em></div>";
  h += "<div class='login-sub'>Use the email or phone number associated with your account.</div>";
  h += "<form class='login-form' onsubmit='submitLogin(event)'>";
  h += "<label class='login-label' for='cred-inp'>Email or phone</label>";
  h += "<input id='cred-inp' class='login-input' type='text' inputmode='email' autocomplete='username' autocapitalize='off' spellcheck='false' placeholder='you@example.com or (555) 555-1234' value='" + (credentialDraft||"") + "' oninput='handleCredentialInput(this.value)'>";
  h += "<div class='login-hint'>We&rsquo;ll send a code to verify it&rsquo;s you.</div>";
  h += "<div class='login-spacer'></div>";
  h += "<button id='login-cta' class='login-cta' type='button' onclick='submitLogin()' " + (canSubmit?"":"disabled") + ">Continue</button>";
  h += "</form>";
  h += "</div>";
  loginOv.innerHTML = h;
  setTimeout(function(){
    var inp = document.getElementById("cred-inp");
    if(inp && !credentialDraft) inp.focus();
  }, 50);
}

render();
</script>
</body>
</html>
