  --ink-700:  #333333;\n  --ink-600:  #595959;\n  --ink-400:  #767676;\n  --ink-300:  #BEBEBE;\n  --ink-200:  #DADADA;\n  --ink-100:  #E0E0E0;\n  --ink-50:   #F0F0F0;\n\n  --amber-700: #B45309;\n  --amber-800: #7C3D0A;\n  --amber-100: #FEF3C7;\n  --rust:     #D85A30;\n  --blue-700: #185FA5;\n  --blue-800: #0C447C;\n  --blue-100: #E6F1FB;\n\n  --radius-sm: 8px;\n  --radius:   10px;\n  --radius-lg: 14px;\n  --radius-xl: 16px;\n\n  --shadow-card: 0 16px 48px rgba(0,0,0,.10);\n  --shadow-bar:  0 -4px 20px rgba(0,0,0,.08);\n}\n\nbody {\n  font-family: 'DM Sans', sans-serif;\n  background: var(--teal-800);\n  min-height: 100vh;\n  display: flex; flex-direction: column;\n  color: var(--ink-900);\n  -webkit-font-smoothing: antialiased;\n}\n\nbutton { font-family: inherit; }\n\n/* ──────────────────────────────────────────────────────────\n   TOP BAR\n   ────────────────────────────────────────────────────────── */\n.topbar {\n  background: var(--teal-800);\n  padding: 12px 24px;\n  display: flex; align-items: center; gap: 16px;\n  flex-shrink: 0;\n  border-bottom: 1px solid rgba(255,255,255,.06);\n}\n.tb-brand { display: flex; align-items: center; gap: 10px; }\n.tb-mark {\n  width: 30px; height: 30px; border-radius: 8px;\n  background: var(--teal-100); color: var(--teal-800);\n  display: flex; align-items: center; justify-content: center;\n  font-family: 'DM Serif Display', serif; font-size: 18px; line-height: 1;\n}\n.tb-title { font-size: 14px; font-weight: 500; color: var(--teal-100); letter-spacing: .04em; }\n.tb-evt   { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }\n\n.tb-mid { flex: 1; display: flex; justify-content: center; }\n\n/* Queue strip — shows next 3 + station status */\n.queue-strip {\n  display: flex; align-items: stretch;\n  background: rgba(255,255,255,.07);\n  border: 1px solid rgba(255,255,255,.12);\n  border-radius: 10px; overflow: hidden;\n  height: 40px;\n}\n.qs-section { display: flex; align-items: center; gap: 8px; padding: 0 14px; cursor: pointer; }\n.qs-section + .qs-section { border-left: 1px solid rgba(255,255,255,.12); }\n.qs-section:hover { background: rgba(255,255,255,.05); }\n.qs-icon {\n  width: 22px; height: 22px; border-radius: 6px;\n  background: rgba(200,238,227,.18); display: flex; align-items: center; justify-content: center;\n}\n.qs-stack { display: flex; flex-direction: column; line-height: 1.15; }\n.qs-stack-lbl { font-size: 9px; color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .06em; }\n.qs-stack-val { font-size: 12px; font-weight: 500; color: #fff; }\n.qs-stack-val .dim { color: rgba(255,255,255,.5); font-weight: 400; }\n.qs-status-dot { width: 7px; height: 7px; border-radius: 50%; }\n.qs-status-dot.ok  { background: #4ADE80; }\n.qs-status-dot.busy { background: #F59E0B; }\n.qs-status-dot.down { background: #EF4444; }\n\n.tb-right { display: flex; align-items: center; gap: 10px; }\n\n.tb-chip {\n  height: 36px; padding: 0 12px;\n  background: rgba(255,255,255,.08);\n  border: 1px solid rgba(255,255,255,.18);\n  border-radius: 9px;\n  color: var(--teal-100);\n  font-size: 12px; font-weight: 500;\n  display: inline-flex; align-items: center; gap: 8px;\n  cursor: pointer;\n}\n.tb-chip:hover { background: rgba(255,255,255,.14); }\n.tb-chip.warn { border-color: #F59E0B; color: #FCD34D; }\n.tb-chip-count {\n  min-width: 20px; height: 20px; padding: 0 5px;\n  background: rgba(200,238,227,.25); border-radius: 999px;\n  display: inline-flex; align-items: center; justify-content: center;\n  font-size: 11px; font-weight: 500; color: #fff;\n}\n\n.live-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--teal-100); padding: 0 10px; }\n.ld { width: 7px; height: 7px; border-radius: 50%; background: #4ADE80; animation: pulse 2s infinite; }\n@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }\n.live-dot.offline .ld { background: #F59E0B; animation: none; }\n\n.clock { font-size: 12px; color: rgba(255,255,255,.55); font-variant-numeric: tabular-nums; padding: 0 4px; }\n\n/* ──────────────────────────────────────────────────────────\n   PROGRESS BAR\n   ────────────────────────────────────────────────────────── */\n.prog-bar { background: var(--teal-700); padding: 10px 24px; display: flex; align-items: center; flex-shrink: 0; }\n.pb-step  { display: flex; align-items: center; gap: 6px; }\n.pb-num {\n  width: 22px; height: 22px; border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 10px; font-weight: 500; flex-shrink: 0;\n}\n.pb-num.done { background: var(--teal-100); color: var(--teal-800); }\n.pb-num.act  { background: #fff; color: var(--teal-800); }\n.pb-num.todo { background: rgba(255,255,255,.15); color: var(--teal-100); }\n.pb-lbl { font-size: 10px; color: var(--teal-100); white-space: nowrap; }\n.pb-lbl.act { color: #fff; font-weight: 500; }\n.pb-line { flex: 1; height: 1px; background: rgba(255,255,255,.2); margin: 0 10px; min-width: 16px; }\n.pb-line.done { background: var(--teal-100); }\n\n/* ──────────────────────────────────────────────────────────\n   APP SHELL\n   ────────────────────────────────────────────────────────── */\n.app { flex: 1; display: flex; flex-direction: column; }\n\n.screen-wrap {\n  flex: 1; display: flex; align-items: flex-start; justify-content: center;\n  padding: 24px; background: var(--cream);\n}\n.screen-card {\n  background: #fff; border-radius: var(--radius-xl);\n  width: 100%; max-width: 720px;\n  box-shadow: var(--shadow-card); overflow: hidden;\n  margin-top: 8px;\n}\n.sc-hdr     { padding: 24px 28px 18px; border-bottom: 1px solid var(--ink-50); }\n.sc-step    { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 6px; }\n.sc-title   { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink-900); line-height: 1.2; }\n.sc-sub     { font-size: 14px; color: var(--ink-600); margin-top: 6px; }\n.sc-body    { padding: 22px 28px 24px; }\n.sc-footer  { padding: 16px 28px 22px; border-top: 1px solid var(--ink-50); display: flex; gap: 12px; align-items: center; }\n\n/* ──────────────────────────────────────────────────────────\n   BUTTONS\n   ────────────────────────────────────────────────────────── */\n.btn-primary {\n  flex: 1; height: 56px; background: var(--teal-800);\n  border: none; border-radius: var(--radius);\n  font-size: 15px; font-weight: 500; color: #fff; cursor: pointer;\n}\n.btn-primary:hover { background: var(--teal-700); }\n.btn-primary:disabled { background: var(--ink-400); cursor: not-allowed; }\n\n.btn-secondary {\n  height: 56px; padding: 0 20px;\n  border: 2px solid var(--ink-200); border-radius: var(--radius);\n  font-size: 14px; font-weight: 500; color: var(--ink-600);\n  background: #fff; cursor: pointer;\n}\n.btn-secondary:hover { border-color: var(--ink-400); }\n\n.btn-outline-green {\n  height: 56px; padding: 0 20px;\n  border: 2px solid var(--teal-800); border-radius: var(--radius);\n  font-size: 14px; font-weight: 500; color: var(--teal-800);\n  background: #fff; cursor: pointer;\n}\n.btn-outline-green:hover { background: var(--teal-25); }\n\n.btn-ghost {\n  height: 36px; padding: 0 12px;\n  border: 1px solid var(--ink-200); border-radius: 8px;\n  font-size: 12px; font-weight: 500; color: var(--ink-700);\n  background: #fff; cursor: pointer;\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.btn-ghost:hover { border-color: var(--teal-800); color: var(--teal-800); }\n\n/* ──────────────────────────────────────────────────────────\n   FORM FIELDS\n   ────────────────────────────────────────────────────────── */\n.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }\n.flbl { font-size: 12px; font-weight: 500; color: var(--ink-600); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }\n.flbl .req { color: var(--rust); }\n.finput {\n  width: 100%; height: 56px;\n  border: 2px solid var(--ink-100); border-radius: var(--radius);\n  font-size: 16px; font-family: inherit; color: var(--ink-900);\n  padding: 0 14px; outline: none; background: #fff;\n}\n.finput:focus { border-color: var(--teal-800); }\n.finput.err   { border-color: var(--rust); background: #FFF7F4; }\n.fhelp { font-size: 11px; color: var(--ink-400); margin-top: 5px; }\n.fhelp.err { color: var(--rust); }\n\n/* ──────────────────────────────────────────────────────────\n   SEARCH RESULT CARDS\n   ────────────────────────────────────────────────────────── */\n.result-card {\n  border: 2px solid var(--ink-100); border-radius: 12px;\n  padding: 16px 18px; margin-bottom: 12px;\n  display: flex; align-items: center; gap: 14px;\n  cursor: pointer; transition: border-color .12s, background .12s;\n  background: #fff;\n}\n.result-card:hover { border-color: var(--teal-800); background: var(--teal-25); }\n.result-card.match { border-color: var(--teal-800); }\n.result-card.newc  { border-color: var(--amber-700); }\n.result-card.newc:hover { background: #FFFBEB; }\n.result-card.ambiguous { border-color: var(--amber-700); border-style: dashed; }\n\n.r-av {\n  width: 48px; height: 48px; border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 16px; font-weight: 500; flex-shrink: 0;\n}\n.r-av.ret { background: var(--teal-50);  color: var(--teal-800); }\n.r-av.new { background: var(--amber-100); color: var(--amber-800); }\n.r-av.dep { background: var(--blue-100);  color: var(--blue-800); }\n\n.r-name { font-size: 16px; font-weight: 500; color: var(--ink-900); margin-bottom: 3px; }\n.r-meta { font-size: 12px; color: var(--ink-600); }\n.r-badge {\n  display: inline-flex; padding: 3px 9px; border-radius: 999px;\n  font-size: 10px; font-weight: 500; margin-top: 6px;\n}\n.rb-ret { background: var(--teal-50); color: #1A5C38; border: 1px solid #2D8653; }\n.rb-new { background: var(--amber-100); color: var(--amber-800); border: 1px solid var(--amber-700); }\n.rb-warn { background: #FFE4E6; color: #9F1239; border: 1px solid #E11D48; }\n.rb-info { background: var(--blue-100); color: var(--blue-800); border: 1px solid var(--blue-700); }\n\n.r-arrow { font-size: 22px; color: var(--teal-800); margin-left: auto; }\n\n/* Disambiguation banner */\n.disambig {\n  display: flex; gap: 10px; padding: 12px 14px;\n  background: #FFFBEB; border: 1px solid var(--amber-700);\n  border-radius: 10px; margin-bottom: 14px; font-size: 13px; color: var(--amber-800);\n}\n.disambig svg { flex-shrink: 0; margin-top: 1px; }\n\n/* Search empty state */\n.search-empty {\n  text-align: center; padding: 22px 16px;\n  color: var(--ink-400); font-size: 13px;\n}\n\n/* ──────────────────────────────────────────────────────────\n   PROFILE\n   ────────────────────────────────────────────────────────── */\n.profile-box {\n  background: var(--ink-50); border-radius: 12px;\n  padding: 16px 18px; margin-bottom: 18px;\n  display: flex; align-items: center; gap: 14px;\n}\n.p-av {\n  width: 52px; height: 52px; border-radius: 50%;\n  background: var(--teal-50); color: var(--teal-800);\n  display: flex; align-items: center; justify-content: center;\n  font-size: 18px; font-weight: 500; flex-shrink: 0;\n}\n\n/* Family member tray */\n.family-tray {\n  background: var(--blue-100); border: 1px solid var(--blue-700);\n  border-radius: 12px; padding: 14px 16px; margin-bottom: 18px;\n}\n.ft-hdr {\n  display: flex; align-items: center; gap: 8px;\n  font-size: 12px; font-weight: 500; color: var(--blue-800);\n  margin-bottom: 10px; text-transform: uppercase; letter-spacing: .04em;\n}\n.ft-list { display: flex; flex-direction: column; gap: 8px; }\n.ft-row {\n  display: flex; align-items: center; gap: 12px;\n  background: #fff; border-radius: 9px; padding: 10px 12px;\n  border: 1px solid rgba(24,95,165,.2);\n}\n.ft-av { width: 36px; height: 36px; border-radius: 50%; background: var(--blue-100); color: var(--blue-800); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; }\n.ft-name { font-size: 14px; font-weight: 500; color: var(--ink-900); }\n.ft-meta { font-size: 11px; color: var(--ink-600); }\n.ft-rm { margin-left: auto; width: 28px; height: 28px; border: none; background: transparent; color: var(--ink-400); cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; }\n.ft-rm:hover { background: var(--ink-50); color: var(--rust); }\n.ft-add {\n  display: inline-flex; align-items: center; gap: 6px;\n  height: 36px; padding: 0 14px;\n  border: 1.5px dashed var(--blue-700); background: #fff; color: var(--blue-800);\n  border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; margin-top: 10px;\n}\n.ft-add:hover { background: var(--blue-100); }\n\n/* Stale data banner */\n.stale-banner {\n  display: flex; gap: 10px; padding: 12px 14px;\n  background: #FFFBEB; border: 1px solid var(--amber-700);\n  border-radius: 10px; margin-bottom: 16px; font-size: 13px; color: var(--amber-800);\n}\n.stale-banner b { color: var(--amber-800); }\n\n/* ──────────────────────────────────────────────────────────\n   SEGMENTED CONTROLS / CHOICES\n   ────────────────────────────────────────────────────────── */\n.vet-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }\n.vet-btn {\n  height: 56px; border: 2px solid var(--ink-100); border-radius: var(--radius);\n  font-size: 15px; font-weight: 500; color: var(--ink-700);\n  background: #fff; cursor: pointer; transition: all .12s;\n}\n.vet-btn:hover { border-color: var(--teal-800); }\n.vet-btn.sel { border-color: var(--teal-800); background: var(--teal-800); color: #fff; }\n\n.dis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n.dis-opt {\n  display: flex; align-items: center; gap: 10px;\n  padding: 12px 14px; border: 2px solid var(--ink-100);\n  border-radius: 10px; background: #fff; cursor: pointer; min-height: 52px;\n  transition: all .12s;\n}\n.dis-opt:hover { border-color: var(--teal-800); }\n.dis-opt.sel  { border-color: var(--teal-800); background: var(--teal-25); }\n.dis-chk {\n  width: 20px; height: 20px; border-radius: 5px;\n  border: 2px solid var(--ink-300); flex-shrink: 0;\n  display: flex; align-items: center; justify-content: center;\n}\n.dis-chk.on { background: var(--teal-800); border-color: var(--teal-800); }\n.dis-chk-icon { width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); }\n.dis-txt { font-size: 13px; color: var(--ink-700); line-height: 1.3; }\n\n/* ──────────────────────────────────────────────────────────\n   CART\n   ────────────────────────────────────────────────────────── */\n.cart-layout { flex: 1; padding: 22px 28px 120px; background: var(--cream); }\n.cart-grid {\n  display: grid; gap: 18px;\n  grid-template-columns: minmax(0, 1fr);\n  max-width: 1100px; margin: 0 auto;\n}\n@media (min-width: 980px) {\n  .cart-grid { grid-template-columns: minmax(0, 1fr) 320px; align-items: start; }\n}\n\n.client-bar {\n  background: #fff; border-radius: 12px; padding: 16px 20px;\n  display: flex; align-items: center; gap: 14px;\n  border: 1px solid var(--ink-100);\n  grid-column: 1 / -1;\n}\n.cb-av { width: 46px; height: 46px; border-radius: 50%; background: var(--teal-50); color: var(--teal-800); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; flex-shrink: 0; }\n.cb-name { font-size: 17px; font-weight: 500; color: var(--ink-900); }\n.cb-meta { font-size: 12px; color: var(--ink-600); margin-top: 2px; }\n.cb-flags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }\n.cb-flag {\n  display: inline-flex; padding: 3px 8px;\n  border: 1px solid var(--amber-700); border-radius: 4px;\n  font-size: 11px; color: var(--amber-800); background: var(--amber-100);\n}\n.cb-flag.vet { border-color: var(--blue-700); color: var(--blue-800); background: var(--blue-100); }\n.cb-edit { margin-left: auto; font-size: 13px; font-weight: 500; color: var(--teal-800); cursor: pointer; flex-shrink: 0; }\n\n/* Family pill bar — switch between family members during cart */\n.family-bar {\n  display: flex; gap: 8px; flex-wrap: wrap;\n  background: #fff; border-radius: 12px; padding: 12px 14px;\n  border: 1px solid var(--ink-100);\n  grid-column: 1 / -1; align-items: center;\n}\n.fb-lbl { font-size: 11px; font-weight: 500; color: var(--ink-600); text-transform: uppercase; letter-spacing: .04em; margin-right: 4px; }\n.fb-pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  height: 38px; padding: 0 12px;\n  border: 1.5px solid var(--ink-100); border-radius: 999px;\n  background: #fff; cursor: pointer;\n  font-size: 13px; font-weight: 500; color: var(--ink-700);\n}\n.fb-pill:hover { border-color: var(--teal-800); }\n.fb-pill.active { border-color: var(--teal-800); background: var(--teal-800); color: #fff; }\n.fb-pill .fb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-300); }\n.fb-pill.has-cart .fb-dot { background: var(--teal-800); }\n.fb-pill.active .fb-dot { background: var(--teal-100); }\n\n/* Sections */\n.section {\n  background: #fff; border-radius: var(--radius-lg);\n  padding: 20px 22px; border: 1px solid var(--ink-100);\n}\n.section.clothing { border: 2px solid var(--teal-800); }\n.sec-title {\n  font-size: 11px; font-weight: 500; letter-spacing: .07em;\n  text-transform: uppercase; color: var(--ink-600);\n  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;\n}\n.sec-icon {\n  width: 26px; height: 26px; border-radius: 7px;\n  background: var(--teal-50);\n  display: flex; align-items: center; justify-content: center; flex-shrink: 0;\n}\n\n/* Right rail summary */\n.summary-rail { display: flex; flex-direction: column; gap: 14px; }\n.summary-card {\n  background: #fff; border-radius: 14px; padding: 18px 20px;\n  border: 1px solid var(--ink-100);\n  position: sticky; top: 16px;\n}\n.sum-title { font-size: 11px; font-weight: 500; le : 8px;\n  white-space: nowrap; position: relative;\n}\n.shop-tab:hover { color: var(--teal-800); }\n.shop-tab.active { background: #fff; color: var(--teal-800); box-shadow: 0 2px 6px rgba(0,0,0,.06); font-weight: 600; }\n.shop-tab .tab-count {\n  display: inline-flex; min-width: 20px; height: 20px; padding: 0 6px;\n  background: var(--teal-800); color: #fff;\n  border-radius: 999px; font-size: 11px; font-weight: 600;\n  align-items: center; justify-content: center;\n}\n.shop-tab.active .tab-count { background: var(--teal-800); }\n.shop-tab:not(.active) .tab-count { background: var(--ink-300); color: #fff; }\n\n/* Style grid — large tap targets */\n.style-grid {\n  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;\n  margin-bottom: 18px;\n}\n@media (min-width: 720px) { .style-grid { grid-template-columns: repeat(3, 1fr); } }\n\n.style-tile {\n  border: 2px solid var(--ink-100); border-radius: 14px;\n  background: #fff; padding: 18px 14px;\n  cursor: pointer; transition: all .15s;\n  display: flex; flex-direction: column; align-items: center; gap: 10px;\n  min-height: 130px; position: relative; user-select: none;\n  text-align: center;\n}\n.style-tile:hover { border-color: var(--teal-800); background: var(--teal-25); transform: translateY(-1px); }\n.style-tile:active { transform: translateY(0); }\n.style-tile.in-cart { border-color: var(--teal-800); background: var(--teal-25); }\n.style-tile.in-cart::after {\n  content: '✓'; position: absolute; top: 10px; right: 10px;\n  width: 26px; height: 26px; border-radius: 50%;\n  background: var(--teal-800); color: #fff;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 14px; font-weight: 600;\n}\n.style-tile-art {\n  width: 56px; height: 56px;\n  background: var(--ink-50); border-radius: 12px;\n  display: flex; align-items: center; justify-content: center;\n  color: var(--ink-600);\n}\n.style-tile.in-cart .style-tile-art { background: rgba(8,80,65,.1); color: var(--teal-800); }\n.style-tile-name { font-size: 14px; font-weight: 500; color: var(--ink-900); line-height: 1.2; }\n.style-tile-meta { font-size: 11px; color: var(--ink-400); }\n\n/* Cart strip — running list at bottom of clothing section */\n.cart-strip {\n  background: var(--cream); border: 1px dashed var(--ink-300);\n  border-radius: 12px; padding: 14px 16px;\n  margin-top: 4px;\n}\n.cart-strip-hdr {\n  display: flex; align-items: center; gap: 8px;\n  font-size: 11px; font-weight: 600; letter-spacing: .06em;\n  text-transform: uppercase; color: var(--ink-600);\n  margin-bottom: 12px;\n}\n.cart-strip.has-items { background: #fff; border: 1.5px solid var(--teal-100); border-style: solid; }\n.cart-strip-empty {\n  font-size: 13px; color: var(--ink-400); padding: 14px 0;\n  text-align: center;\n}\n.cart-line {\n  display: flex; align-items: center; gap: 12px;\n  padding: 10px 0; border-top: 1px solid var(--ink-50);\n}\n.cart-line:first-of-type { border-top: none; }\n.cart-line-art {\n  width: 36px; height: 36px; border-radius: 9px;\n  background: var(--teal-50); color: var(--teal-800);\n  display: flex; align-items: center; justify-content: center; flex-shrink: 0;\n}\n.cart-line-body { flex: 1; min-width: 0; }\n.cart-line-name { font-size: 14px; font-weight: 500; color: var(--ink-900); }\n.cart-line-meta {\n  font-size: 11px; color: var(--ink-600); margin-top: 2px;\n  display: flex; gap: 8px; flex-wrap: wrap;\n}\n.cart-line-meta .pill {\n  display: inline-flex; padding: 2px 7px;\n  background: var(--ink-50); border-radius: 4px;\n  font-size: 11px; color: var(--ink-700);\n}\n.cart-line-meta .pill.warn {\n  background: #FFFBEB; color: var(--amber-800);\n  border: 1px solid var(--amber-700);\n}\n\n/* Inline size picker drawer */\n.size-drawer {\n  margin-top: 8px; padding: 12px 14px;\n  background: var(--cream); border-radius: 9px;\n  display: flex; flex-direction: column; gap: 10px;\n}\n.size-drawer.compact { padding: 10px 12px; }\n.size-drawer .row {\n  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;\n}\n.size-drawer .row-lbl {\n  font-size: 11px; font-weight: 500; color: var(--ink-600);\n  text-transform: uppercase; letter-spacing: .04em;\n  min-width: 60px;\n}\n\n/* Mini chips for inline drawer */\n.mini-chip {\n  height: 34px; min-width: 42px; padding: 0 10px;\n  border: 1.5px solid var(--ink-200); border-radius: 8px;\n  font-size: 13px; font-weight: 500; color: var(--ink-700);\n  background: #fff; cursor: pointer;\n  display: flex; align-items: center; justify-content: center;\n}\n.mini-chip:hover { border-color: var(--teal-800); color: var(--teal-800); }\n.mini-chip.sel { background: var(--teal-800); border-color: var(--teal-800); color: #fff; }\n\n/* Quick-add row for color pref + global tools */\n.quick-tools {\n  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\n  background: #F8F8F8; border-radius: 10px; padding: 12px 14px;\n  border: 1px solid var(--ink-50); margin-bottom: 18px;\n}\n\n/* Floating cart count badge on category tabs */\n.cart-fab {\n  display: inline-flex; align-items: center; gap: 6px;\n  height: 32px; padding: 0 12px;\n  background: var(--teal-800); color: #fff;\n  border-radius: 999px; font-size: 12px; font-weight: 600;\n  margin-left: auto;\n}\n\n/* Shoe size keypad-ish */\n.shoe-tile-row {\n  display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;\n}\n.shoe-tile {\n  height: 44px; border: 1.5px solid var(--ink-200); border-radius: 8px;\n  background: #fff; font-size: 14px; font-weight: 500; color: var(--ink-700);\n  cursor: pointer; display: flex; align-items: center; justify-content: center;\n}\n.shoe-tile:hover { border-color: var(--teal-800); color: var(--teal-800); }\n.shoe-tile.sel { background: var(--teal-800); border-color: var(--teal-800); color: #fff; }\n\n/* qty pill (compact) */\n.qty-pill {\n  display: inline-flex; align-items: center; gap: 6px;\n  background: #fff; border: 1.5px solid var(--teal-800);\n  border-radius: 999px; padding: 2px;\n  flex-shrink: 0;\n}\n.qty-pill ient name<\u002Fdiv><div class=\"bline\"><\u002Fdiv>\n            <div class=\"bl\">Date of birth<\u002Fdiv><div class=\"bline\"><\u002Fdiv>\n            <div class=\"bl\">Family / dependents<\u002Fdiv><div class=\"bline\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right;flex-shrink:0;min-width:110px;\">\n            <div class=\"bl\" style=\"margin-top:0;\">Check-in time<\u002Fdiv>\n            <div style=\"font-family:'DM Serif Display',serif;font-size:36px;color:#1a1a1a;border-bottom:2px solid #1a1a1a;padding-bottom:2px;min-width:100px;display:inline-block;text-align:center;\">__:__<\u002Fdiv>\n            <div style=\"font-size:9px;color:#595959;margin-top:3px;\">AM / PM &nbsp; # _____<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bl\" style=\"margin-top:0;\">Services<\u002Fdiv>\n        <div class=\"bchk-row\"><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Shower<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Haircut<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Clothing<\u002Fdiv><\u002Fdiv>\n        <div class=\"bl\">Veteran<\u002Fdiv>\n        <div class=\"bchk-row\"><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Yes<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>No<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Unknown<\u002Fdiv><\u002Fdiv>\n        <div class=\"bl\">Disability / access flags<\u002Fdiv>\n        <div class=\"bchk-row\"><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Mobility<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Visual<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Hearing<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Cognitive<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Medical<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Other<\u002Fdiv><\u002Fdiv>\n        <div style=\"border-top:1.5px solid #1a1a1a;margin-top:12px;padding-top:12px;\">\n          <div class=\"bl\" style=\"margin-top:0;\">Clothing — color pref: _____________<\u002Fdiv>\n          <div class=\"b3\" style=\"margin-top:8px;\"><div><div class=\"bl\" style=\"margin-top:0;\">Top style<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><div><div class=\"bl\" style=\"margin-top:0;\">Top size<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><div><div class=\"bl\" style=\"margin-top:0;\">Top qty<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"b3\" style=\"margin-top:8px;\"><div><div class=\"bl\" style=\"margin-top:0;\">Bottom style<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><div><div class=\"bl\" style=\"margin-top:0;\">Waist / size<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><div><div class=\"bl\" style=\"margin-top:0;\">Inseam (jeans)<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"b3\" style=\"margin-top:8px;\"><div><div class=\"bl\" style=\"margin-top:0;\">Underwear<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><div><div class=\"bl\" style=\"margin-top:0;\">Bra size<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><div><div class=\"bl\" style=\"margin-top:0;\">Shoe size<\u002Fdiv><div class=\"bline\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"margin-top:8px;\"><div class=\"bl\" style=\"margin-top:0;\">Extras<\u002Fdiv>\n          <div class=\"bchk-row\"><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Hat<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Blanket<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Bag<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Socks<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Gloves<\u002Fdiv><div class=\"bchk\"><div class=\"bchk-box\"><\u002Fdiv>Belt<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mf-row\" style=\"padding:14px 0 0;border:none;\">\n        <button class=\"mf mf-p\" onclick=\"window.print()\">🖨 Print blank slip<\u002Fbutton>\n        <button class=\"mf mf-c\" onclick=\"hideOffline()\">Return to intake<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"modals\"><\u002Fdiv>\n\n<!-- Tweaks panel -->\n<div class=\"tweaks\" id=\"tweaks\"><\u002Fdiv>\n\n<script src=\"c59bba64-7a3b-45c5-a175-9cbb2d4f1db5\"><\u002Fscript>\n<script src=\"0a39895d-b40f-4a6a-bcfa-3b4a578adafc\"><\u002Fscript>\n<script>\n  // Edit-mode protocol\n  window.addEventListener('message', (e) => {\n    if (!e.data || !e.data.type) return;\n    if (e.data.type === '__activate_edit_mode')   document.getElementById('tweaks').classList.add('show');\n    if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('show');\n  });\n  window.parent.postMessage({type:'__edit_mode_available'}, '*');\n  // Override close to also notify host\n  function toggleTweaks(){\n    const el = document.getElementById('tweaks');\n    el.classList.toggle('show');\n    if (!el.classList.contains('show')) window.parent.postMessage({type:'__edit_mode_dismissed'},'*');\n  }\n  render();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
