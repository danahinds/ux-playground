[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173

# SPA fallback — any path with no matching static file renders index.html
# so React Router can handle it on refresh. Static files (the uploaded
# prototypes under /prototypes/<slug>/...) are still served directly
# because Netlify prefers static assets over rewrites.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
