[build]
  command = "npm run build"
  publish = "dist"

# Prototype files served directly (must come before SPA fallback)
[[redirects]]
  from = "/prototypes/*"
  to = "/prototypes/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
