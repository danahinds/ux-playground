<body data-aesthetic="dark" data-palette="graphite">
  <div id="root"></div>

  <!-- Hidden forms for Netlify Forms build-time detection -->
  <form name="playground-intake" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="session-id" />
    <input name="prototype" />
    <input name="age-range" />
    <input name="role" />
    <input name="tech-comfort" />
    <input name="familiarity" />
    <input name="timestamp" />
  </form>

  <form name="playground-session" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="session-id" />
    <input name="prototype" />
    <input name="mode" />
    <input name="intent" />
    <input name="success" />
    <input name="confusion" />
    <input name="ease" />
    <input name="task-timings" />
    <input name="timestamp" />
  </form>

  <script type="module" src="/src/main.jsx"></script>
